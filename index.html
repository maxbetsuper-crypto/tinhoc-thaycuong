        const CourseRegistrationModal = ({ onClose, onRegister, defaultGrade, courseType }) => {
            const [studentName, setStudentName] = useState("");
            const [phone, setPhone] = useState("");
            const [email, setEmail] = useState("");
            const [regGrade, setRegGrade] = useState(defaultGrade || 8); 
            const [isSubmitted, setIsSubmitted] = useState(false);

            const isScratch = courseType === 'scratch';
            const title = isScratch ? "Lập trình Scratch" : "Lập trình Python";
            const subTitle = isScratch ? "Dành cho học sinh mới bắt đầu" : "Làm chủ ngôn ngữ lập trình phổ biến";
            const timeInfo = isScratch ? "Học kỳ 2 năm học 2025-2026" : "Khai giảng hàng tháng";
            const gradient = isScratch ? "from-orange-500 to-red-500" : "from-blue-600 to-cyan-600";
            const Icon = isScratch ? Gamepad2 : Terminal;

            const handleSubmit = (e) => {
                e.preventDefault();
                onRegister({ studentName, phone, email, regGrade, courseType });
                setIsSubmitted(true);
            };

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-in fade-in duration-300 overflow-y-auto">
                <div className="bg-slate-900 text-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-700 animate-in zoom-in-95 duration-300 relative">
                    <div className={`bg-gradient-to-r ${gradient} p-4 md:p-6 relative`}>
                    <button onClick={onClose} className="absolute top-3 right-3 md:top-4 md:right-4 text-white/80 hover:text-white hover:bg-white/20 rounded-full p-1 transition-all"><XCircle size={24} className="md:w-7 md:h-7"/></button>
                    <div className="flex items-center gap-3 mb-2">
                        <Icon size={28} className="text-yellow-300 md:w-8 md:h-8" />
                        <h2 className="text-xl md:text-2xl font-bold text-white">{title}</h2>
                    </div>
                    <p className="text-white/90 text-xs md:text-sm font-semibold bg-black/20 inline-block px-2 py-1 rounded mb-1">
                        <Calendar size={12} className="inline mr-1"/> {timeInfo}
                    </p>
                    <p className="text-blue-100 text-xs md:text-sm">{subTitle}</p>
                    </div>

                    <div className="p-4 md:p-8">
                    {!isSubmitted ? (
                        <form onSubmit={handleSubmit} className="space-y-3 md:space-y-4">
                            <div>
                                <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Họ và tên học sinh</label>
                                <input type="text" required value={studentName} onChange={(e) => setStudentName(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:outline-none" placeholder="Nhập họ và tên..." />
                            </div>
                            <div>
                                <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Đăng ký chương trình Khối</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {[6, 7, 8, 9].map(g => (
                                    <button key={g} type="button" onClick={() => setRegGrade(g)} className={`py-2 rounded-lg font-bold border text-sm md:text-base transition-all ${regGrade === g ? 'bg-yellow-400 text-slate-900 border-yellow-400' : 'bg-transparent text-slate-400 border-slate-600 hover:border-slate-400'}`}>Lớp {g}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Số điện thoại liên hệ (Zalo)</label>
                                <input type="tel" required value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:outline-none" placeholder="Nhập số điện thoại..." />
                            </div>
                            <div>
                                <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Email (Không bắt buộc)</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:outline-none" placeholder="email@example.com" />
                            </div>
                            <button type="submit" className={`w-full py-3 md:py-4 bg-gradient-to-r ${gradient} text-white font-bold text-base md:text-lg rounded-xl hover:shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2 mt-2 md:mt-4`}>
                                <Edit3 size={18} className="md:w-5 md:h-5" /> XÁC NHẬN ĐĂNG KÝ
                            </button>
                        </form>
                    ) : (
                        <div className="text-center py-6 md:py-8">
                            <div className="w-16 h-16 md:w-20 md:h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <CheckCircle size={32} className="md:w-10 md:h-10 text-green-400" />
                            </div>
                            <h3 className="text-xl md:text-2xl font-bold text-white mb-2">Đăng ký thành công!</h3>
                            <p className="text-slate-400 text-sm md:text-base mb-6">Em <strong>{studentName}</strong> đã đăng ký khóa <strong>{title} - Lớp {regGrade}</strong>.<br/>Thầy sẽ liên hệ qua SĐT <strong>{phone}</strong>.</p>
                            <button onClick={onClose} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-bold text-sm md:text-base">Đóng</button>
                        </div>
                    )}
                    </div>
                </div>
                </div>
            );
        };

        const ChangePasswordModal = ({ onClose, onChangePassword }) => {
            const [newPwd, setNewPwd] = useState("");
            const [confirmPwd, setConfirmPwd] = useState("");
            const [error, setError] = useState("");
            const handleSubmit = (e) => {
                e.preventDefault();
                if (newPwd.length < 4) return setError("Mật khẩu phải có ít nhất 4 ký tự.");
                if (newPwd !== confirmPwd) return setError("Mật khẩu không khớp.");
                onChangePassword(newPwd);
                onClose();
            };
            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4">
                <div className="bg-white p-6 rounded-xl w-full max-w-sm">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><Key size={20} className="text-indigo-600" /> Đổi Mật Khẩu Admin</h3>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input type="password" value={newPwd} onChange={(e) => setNewPwd(e.target.value)} className="w-full p-2 border rounded" placeholder="Mật khẩu mới" autoFocus />
                        <input type="password" value={confirmPwd} onChange={(e) => setConfirmPwd(e.target.value)} className="w-full p-2 border rounded" placeholder="Xác nhận mật khẩu" />
                        {error && <p className="text-red-500 text-sm">{error}</p>}
                        <div className="flex gap-2"><button type="button" onClick={onClose} className="flex-1 py-2 bg-slate-200 rounded">Hủy</button><button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded">Lưu</button></div>
                    </form>
                </div>
                </div>
            );
        };

        const AdminScreen = ({ onBack, studentList, onDeleteHistory, onUploadData, onChangePassword, onUpdateClassStructure, classStructure }) => {
            const [activeTab, setActiveTab] = useState('history');
            const [filterGrade, setFilterGrade] = useState('ALL');
            const [filterDate, setFilterDate] = useState('ALL');
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [newClassInput, setNewClassInput] = useState({ grade: 6, name: "" });
            const fileInputRef = useRef(null);

            const handleDownloadTemplate = () => {
                const rows = [["Lớp","Loại","Câu hỏi","A","B","C","D","Đáp án"],[8,"TN","Tin học ứng dụng lĩnh vực nào?","Y tế","Giáo dục","Quốc phòng","Cả 3","D"]];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(rows);
                XLSX.utils.book_append_sheet(wb, ws, "Mau");
                XLSX.writeFile(wb, "Mau_Cau_Hoi.xlsx");
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, {type:'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws, {header:1});
                    const newBank = JSON.parse(JSON.stringify(DEFAULT_QUESTION_BANK));
                    json.slice(1).forEach((row, i) => {
                        if(!row[0] || !row[2]) return;
                        const g = row[0].toString();
                        const type = row[1];
                        if(!newBank[g]) newBank[g] = {mcq:[], tf:[], fill:[], essay:[]};
                        if(type==='TN') newBank[g].mcq.push({id: Date.now()+i, question: row[2], options: [row[3],row[4],row[5],row[6]], correct: ['A','B','C','D'].indexOf(row[7])});
                        else if(type==='DS') newBank[g].tf.push({id: Date.now()+i, question: row[2], correct: ['đúng','true','đ'].includes(row[7]?.toLowerCase())});
                        else if(type==='DK') newBank[g].fill.push({id: Date.now()+i, question: row[2], answer: row[7]});
                        else if(type==='TL') newBank[g].essay.push({id: Date.now()+i, question: row[2], hint: row[7]});
                    });
                    onUploadData(newBank);
                    alert("Cập nhật thành công!");
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null;
            };

            const handleAddClass = () => {
                if (!newClassInput.name.trim()) return alert("Vui lòng nhập tên lớp!");
                onUpdateClassStructure(newClassInput.grade, newClassInput.name.trim());
                setNewClassInput({ ...newClassInput, name: "" }); 
            };

            const uniqueDates = Array.from(new Set(studentList.map(s => s.dateKey || "N/A")));
            const filteredList = studentList.filter(s => (filterGrade === 'ALL' || s.grade.toString() === filterGrade) && (filterDate === 'ALL' || s.dateKey === filterDate));
            const pythonStudents = studentList.filter(s => s.pythonReg);
            const scratchStudents = studentList.filter(s => s.scratchReg);

            return (
                <div className="min-h-screen bg-slate-100 p-2 md:p-6">
                    <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
                        <div className="bg-indigo-900 p-4 md:p-6 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-yellow-400 p-2 rounded-lg text-indigo-900"><Lock size={24}/></div>
                                <div><h2 className="text-xl md:text-2xl font-bold">Quản Trị {isOnline ? "(Online)" : "(Offline)"}</h2><p className="text-indigo-200 text-sm">Thống kê & Quản lý</p></div>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={() => setShowPwdModal(true)} className="flex-1 md:flex-none bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg flex justify-center items-center gap-2 text-sm"><Key size={16}/> Mật khẩu</button>
                                <button onClick={onBack} className="flex-1 md:flex-none bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg flex justify-center items-center gap-2 text-sm"><LogOut size={16}/> Thoát</button>
                            </div>
                        </div>
                        {showPwdModal && <ChangePasswordModal onClose={() => setShowPwdModal(false)} onChangePassword={onChangePassword} />}
                        
                        <div className="p-4 md:p-6">
                            <div className="grid md:grid-cols-2 gap-4 mb-6">
                                <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl">
                                    <h3 className="font-bold text-blue-900 flex gap-2 mb-2"><Database size={18}/> Quản lý Câu hỏi (Excel)</h3>
                                    <div className="flex gap-2">
                                        <button onClick={handleDownloadTemplate} className="flex-1 px-3 py-2 bg-white border rounded shadow-sm text-sm font-bold flex justify-center items-center gap-1"><Download size={14}/> Mẫu</button>
                                        <button onClick={() => fileInputRef.current.click()} className="flex-1 px-3 py-2 bg-blue-600 text-white rounded shadow-sm text-sm font-bold flex justify-center items-center gap-1"><Upload size={14}/> Upload</button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx" onChange={handleFileChange}/>
                                    </div>
                                </div>
                                <div className="p-4 bg-green-50 border border-green-200 rounded-xl">
                                    <h3 className="font-bold text-green-900 flex gap-2 mb-2"><Plus size={18}/> Thêm Lớp Mới</h3>
                                    <div className="flex gap-2">
                                        <select 
                                            value={newClassInput.grade} 
                                            onChange={(e) => setNewClassInput({...newClassInput, grade: Number(e.target.value)})} 
                                            className="border rounded px-2 py-1 text-sm"
                                        >
                                            <option value={6}>K6</option><option value={7}>K7</option><option value={8}>K8</option><option value={9}>K9</option>
                                        </select>
                                        <input 
                                            type="text" 
                                            placeholder="Tên lớp (VD: 9A7)" 
                                            value={newClassInput.name}
                                            onChange={(e) => setNewClassInput({...newClassInput, name: e.target.value})}
                                            className="flex-1 border rounded px-2 py-1 text-sm"
                                        />
                                        <button onClick={handleAddClass} className="bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">Thêm</button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-2 mb-4 border-b pb-2 overflow-x-auto no-scrollbar">
                                <button onClick={() => setActiveTab('history')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='history'?'bg-indigo-100 text-indigo-700':'text-slate-500'}`}><List size={16}/> Lịch sử</button>
                                <button onClick={() => setActiveTab('python')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='python'?'bg-yellow-100 text-yellow-700':'text-slate-500'}`}><Code size={16}/> Python ({pythonStudents.length})</button>
                                <button onClick={() => setActiveTab('scratch')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='scratch'?'bg-orange-100 text-orange-700':'text-slate-500'}`}><Gamepad2 size={16}/> Scratch ({scratchStudents.length})</button>
                            </div>

                            {activeTab === 'history' && (
                                <div>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)} className="border p-2 rounded text-sm w-full md:w-auto"><option value="ALL">Tất cả Khối</option><option value="6">Khối 6</option><option value="7">Khối 7</option><option value="8">Khối 8</option><option value="9">Khối 9</option></select>
                                        <select value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="border p-2 rounded text-sm w-full md:w-auto"><option value="ALL">Tất cả Ngày</option>{uniqueDates.map(d=><option key={d} value={d}>{d}</option>)}</select>
                                        <button onClick={onDeleteHistory} className="ml-auto text-red-500 border border-red-200 px-3 py-2 rounded hover:bg-red-50 text-sm flex items-center gap-1"><Trash2 size={16}/> Xóa lịch sử</button>
                                    </div>
                                    <div className="overflow-x-auto border rounded-xl">
                                        <table className="w-full text-left min-w-[600px]">
                                            <thead className="bg-slate-50 border-b"><tr><th className="p-3">Tên</th><th className="p-3">Lớp</th><th className="p-3">Ngày</th><th className="p-3 text-right">Điểm</th></tr></thead>
                                            <tbody>
                                                {filteredList.map((s,i) => (
                                                    <tr key={i} className="border-b hover:bg-slate-50 text-sm">
                                                        <td className="p-3 font-bold text-indigo-900">{s.name}</td>
                                                        <td className="p-3"><span className="bg-blue-100 px-2 py-1 rounded text-xs font-bold text-blue-800">{s.className}</span></td>
                                                        <td className="p-3 text-slate-500">{s.loginTime}</td>
                                                        <td className="p-3 text-right font-bold text-green-600">{s.lastScore||'-'}</td>
                                                    </tr>
                                                ))}
                                                {filteredList.length === 0 && <tr><td colSpan="4" className="p-4 text-center text-slate-400 text-sm">Chưa có dữ liệu</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {(activeTab === 'python' || activeTab === 'scratch') && (
                                <div className="overflow-x-auto border rounded-xl">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead className={`border-b ${activeTab==='python'?'bg-yellow-50':'bg-orange-50'}`}>
                                            <tr><th className="p-3">Họ Tên</th><th className="p-3">Lớp (Trường)</th><th className="p-3">Đăng ký</th><th className="p-3">SĐT</th><th className="p-3">Ngày ĐK</th></tr>
                                        </thead>
                                        <tbody>
                                            {(activeTab==='python' ? pythonStudents : scratchStudents).map((s,i) => {
                                                const reg = activeTab==='python' ? s.pythonReg : s.scratchReg;
                                                return (
                                                    <tr key={i} className="border-b hover:bg-slate-50 text-sm">
                                                        <td className="p-3 font-bold">{reg.studentName}</td>
                                                        <td className="p-3">{s.className}</td>
                                                        <td className="p-3"><span className="font-bold border px-2 py-1 rounded bg-white">Lớp {reg.regGrade}</span></td>
                                                        <td className="p-3 font-mono text-indigo-600">{reg.phone}</td>
                                                        <td className="p-3 text-slate-500">{s.dateKey}</td>
                                                    </tr>
                                                );
                                            })}
                                            {(activeTab==='python' ? pythonStudents : scratchStudents).length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Chưa có đăng ký nào.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const WelcomeScreen = ({ onLogin, onAdminLogin, adminPassword, classStructure }) => {
            const [name, setName] = useState("");
            const [grade, setGrade] = useState(8);
            const [cls, setCls] = useState("");
            const [isAdmin, setIsAdmin] = useState(false);
            const [pwd, setPwd] = useState("");

            useEffect(() => {
                if(classStructure[grade] && classStructure[grade].length > 0) setCls(classStructure[grade][0]);
                else setCls("");
            }, [grade, classStructure]);

            const handleLogin = () => {
                if(!name.trim()) return alert("Vui lòng nhập tên!");
                if(!cls) return alert("Vui lòng chọn lớp!");
                onLogin({ name, grade, className: cls });
            };

            const checkAdmin = (e) => {
                e.preventDefault();
                if(pwd === adminPassword) onAdminLogin(); 
                else alert("Sai mật khẩu");
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-cover bg-center relative" style={{backgroundImage: `url('${BACKGROUND_IMAGE}')`, backgroundColor: '#1e293b'}}>
                    <div className="absolute inset-0 bg-slate-900/70"></div>
                    
                    {isAdmin && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <form onSubmit={checkAdmin} className="bg-white p-6 rounded-xl w-full max-w-sm animate-in">
                                <h3 className="font-bold text-lg mb-4">Đăng nhập Quản trị</h3>
                                <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} className="border w-full p-2 rounded mb-4" placeholder="Mật khẩu" autoFocus/>
                                <div className="flex gap-2"><button type="button" onClick={()=>setIsAdmin(false)} className="flex-1 bg-slate-200 py-2 rounded hover:bg-slate-300">Hủy</button><button className="flex-1 bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Vào</button></div>
                            </form>
                        </div>
                    )}

                    <div className="absolute top-4 right-4 flex gap-2 z-20">
                         {isOnline ? <span className="bg-green-500/20 text-green-300 text-xs px-2 py-1 rounded border border-green-500/50 flex items-center gap-1"><Cloud size={12}/> Online</span> : <span className="bg-gray-500/20 text-gray-300 text-xs px-2 py-1 rounded border border-gray-500/50 flex items-center gap-1"><CloudOff size={12}/> Offline</span>}
                         <button onClick={()=>setIsAdmin(true)} className="text-white/50 hover:text-white transition-colors"><Lock size={20}/></button>
                    </div>

                    <div className="relative z-10 bg-white/10 backdrop-blur-md p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/20 animate-in slide-in-from-bottom-8 duration-500">
                        <div className="text-center mb-6 md:mb-8">
                            <div className="bg-gradient-to-tr from-yellow-400 to-orange-500 w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg animate-bounce"><Monitor size={40} className="text-white md:w-12 md:h-12"/></div>
                            <h1 className="text-xl md:text-2xl font-bold mb-2 text-white uppercase leading-snug drop-shadow-lg">
                                ĐAM MÊ TIN HỌC VỚI THẦY LÊ ĐÌNH CƯƠNG<br/>
                                TRƯỜNG THCS CƯ PUI
                            </h1>
                            <div className="mt-4 p-3 bg-black/30 border border-white/20 rounded-xl backdrop-blur-sm inline-block">
                                <p className="text-yellow-300 font-bold text-sm md:text-base flex items-center justify-center gap-2">
                                    <Phone size={16} className="animate-pulse"/> Thông tin liên hệ: Zalo 0967080202
                                </p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full p-3 rounded-xl bg-black/40 border border-white/30 text-white placeholder-white/50 outline-none focus:ring-2 focus:ring-yellow-400" placeholder="Họ và tên học sinh..."/>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-blue-200 text-xs ml-1">Khối</label><select value={grade} onChange={e=>setGrade(Number(e.target.value))} className="w-full p-3 rounded-xl bg-black/40 border border-white/30 text-white font-bold"><option className="text-black" value={6}>6</option><option className="text-black" value={7}>7</option><option className="text-black" value={8}>8</option><option className="text-black" value={9}>9</option></select></div>
                                <div><label className="text-blue-200 text-xs ml-1">Lớp</label><select value={cls} onChange={e=>setCls(e.target.value)} className="w-full p-3 rounded-xl bg-black/40 border border-white/30 text-white font-bold">{classStructure[grade]?.map(c=><option className="text-black" key={c} value={c}>{c}</option>)}</select></div>
                            </div>
                            <button onClick={handleLogin} className="w-full py-3 bg-gradient-to-r from-yellow-400 to-orange-500 text-indigo-900 font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-all flex justify-center items-center gap-2"><Play size={20}/> BẮT ĐẦU</button>
                        </div>
                    </div>
                    <p className="mt-6 text-sm text-white/50 relative z-10">© 2025 Design by Thầy Lê Đình Cương GV Tin Học THCS Cư Pui</p>
                </div>
            );
        };

        const Dashboard = ({ user, onSelectMode, onLogout, onOpenCourse }) => (
            <div className="min-h-screen bg-slate-50">
                <header className="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-10 flex justify-between items-center">
                    <div className="flex items-center gap-3"><div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-yellow-400 flex items-center justify-center text-indigo-900 font-bold">{user.grade}</div><div><h2 className="font-bold text-base md:text-lg">{user.name}</h2><p className="text-xs text-blue-200">{user.className}</p></div></div>
                    <button onClick={onLogout} className="text-sm bg-white/10 px-3 py-1 rounded hover:bg-white/20">Thoát</button>
                </header>
                <div className="max-w-4xl mx-auto p-4 md:p-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div onClick={()=>onOpenCourse('python')} className="p-6 bg-gradient-to-br from-slate-800 to-indigo-900 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Code size={24} className="text-cyan-400"/> LẬP TRÌNH PYTHON</h3>
                            <p className="text-slate-300 text-sm mb-4">Làm chủ ngôn ngữ lập trình.</p>
                            <button onClick={()=>onOpenCourse('python')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                        <div onClick={()=>onOpenCourse('scratch')} className="p-6 bg-gradient-to-br from-orange-600 to-red-700 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Gamepad2 size={24} className="text-yellow-300"/> LẬP TRÌNH SCRATCH</h3>
                            <p className="text-orange-100 text-sm mb-4">Học kỳ 2 năm học 2025-2026.</p>
                            <button onClick={()=>onOpenCourse('scratch')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                    </div>
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 flex items-center gap-2"><Star size={24} className="text-yellow-500" fill="currentColor"/> Chọn thử thách</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {[{id:'mcq',t:'Trắc Nghiệm',i:<CheckCircle size={28}/>,c:'from-blue-500 to-cyan-400'},{id:'tf',t:'Đúng / Sai',i:<HelpCircle size={28}/>,c:'from-green-500 to-emerald-400'},{id:'fill',t:'Điền Khuyết',i:<Edit3 size={28}/>,c:'from-purple-500 to-pink-400'},{id:'essay',t:'Tự Luận',i:<BookOpen size={28}/>,c:'from-orange-500 to-red-400'}].map(m=>(
                            <button key={m.id} onClick={()=>onSelectMode(m.id)} className={`relative p-5 md:p-6 rounded-2xl shadow-lg hover:-translate-y-1 transition-all bg-gradient-to-br ${m.c} text-white text-left overflow-hidden group`}>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform"></div>
                                <div className="relative z-10 flex justify-between items-center"><div><h4 className="text-xl md:text-2xl font-bold">{m.t}</h4></div><div className="p-3 bg-white/20 rounded-xl">{m.i}</div></div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        const GameScreen = ({ user, mode, onFinish, onBack, questionData }) => {
            const [idx, setIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [status, setStatus] = useState(null); 
            const [input, setInput] = useState("");
            const [showHint, setShowHint] = useState(false);
            
            const questions = questionData[user.grade]?.[mode] || [];
            const q = questions[idx];

            useEffect(()=>{setStatus(null); setInput(""); setShowHint(false);}, [idx]);

            if(!q) return <div className="p-10 text-center">Chưa có câu hỏi. <button onClick={onBack}>Quay lại</button></div>;

            const handleAns = (ans) => {
                if(status) return;
                let isCorrect = false;
                if(mode==='mcq' || mode==='tf') isCorrect = (ans === q.correct);
                else isCorrect = (input.trim().toLowerCase() === q.answer.trim().toLowerCase());

                setStatus(isCorrect?'correct':'wrong');
                if(isCorrect) setScore(score+10);

                setTimeout(() => {
                    if(idx < questions.length - 1) setIdx(idx+1);
                    else onFinish({score: isCorrect?score+10:score, total: questions.length*10});
                }, 3000); 
            };

            const askAI = async (type) => {
                setLoadingAI(true);
                const p = type==='hint' ? `Gợi ý ngắn gọn cho câu hỏi: "${q.question}"` : `Chấm điểm câu trả lời: "${input}" cho câu hỏi "${q.question}". Gợi ý: "${q.hint}"`;
                const res = await callGeminiAPI(p);
                setAiRes(res);
                setLoadingAI(false);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-white p-6 rounded-3xl shadow-xl relative overflow-hidden min-h-[400px] flex flex-col">
                        <div className="flex justify-between mb-4 text-slate-400"><button onClick={onBack}><X size={24}/></button><span className="font-bold text-indigo-600">{idx+1}/{questions.length}</span></div>
                        
                        {status && (
                            <div className={`absolute inset-0 z-20 flex flex-col items-center justify-center text-white animate-in ${status==='correct'?'bg-green-500/95':'bg-red-500/95'}`}>
                                {status==='correct' ? <CheckCircle size={64} className="mb-2"/> : <XCircle size={64} className="mb-2"/>}
                                <h2 className="text-3xl font-bold mb-2">{status==='correct' ? 'CHÍNH XÁC!' : 'SAI RỒI!'}</h2>
                                {status==='wrong' && (
                                    <div className="bg-white/20 p-4 rounded-xl backdrop-blur-sm mt-4 text-center border border-white/30">
                                        <p className="text-xs uppercase font-bold opacity-80 mb-1">Đáp án đúng là:</p>
                                        <p className="text-xl font-bold">
                                            {mode==='mcq' ? q.options[q.correct] : mode==='tf' ? (q.correct?'ĐÚNG':'SAI') : q.answer}
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="flex-1 flex flex-col justify-center text-center">
                            <span className="text-xs font-bold text-blue-500 uppercase tracking-widest mb-2">{mode}</span>
                            <h2 className="text-2xl font-bold text-slate-800 mb-8">{q.question}</h2>
                            
                            {mode==='mcq' && <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{q.options.map((o,i)=><button key={i} onClick={()=>handleAns(i)} className="p-4 border-2 rounded-xl font-semibold hover:bg-blue-50 hover:border-blue-500 text-left flex gap-2"><span className="text-blue-600 font-bold">{String.fromCharCode(65+i)}.</span> {o}</button>)}</div>}
                            {mode==='tf' && <div className="grid grid-cols-2 gap-4"><button onClick={()=>handleAns(true)} className="p-6 bg-green-50 border-2 border-green-200 text-green-700 font-bold rounded-xl text-xl hover:bg-green-100">ĐÚNG</button><button onClick={()=>handleAns(false)} className="p-6 bg-red-50 border-2 border-red-200 text-red-700 font-bold rounded-xl text-xl hover:bg-red-100">SAI</button></div>}
                            {(mode==='fill' || mode==='essay') && <div className="space-y-4">
                                {mode==='fill' ? <input value={input} onChange={e=>setInput(e.target.value)} className="w-full p-4 text-center text-lg md:text-xl outline-none border-2 rounded-xl focus:border-indigo-500" placeholder="Đáp án..."/> : <textarea value={input} onChange={e=>setInput(e.target.value)} className="w-full p-4 border-2 rounded-xl text-base md:text-lg outline-none focus:border-orange-500" rows="4" placeholder="Trả lời..."/>}
                                {showHint && <div className="bg-yellow-50 p-3 rounded text-yellow-800 text-sm">Gợi ý: {q.hint}</div>}
                                <div className="flex gap-2">
                                    {mode==='essay' && <button onClick={()=>setShowHint(true)} className="px-4 py-3 bg-white border font-bold rounded-xl text-slate-600 text-sm">Gợi ý</button>}
                                    {mode==='essay' && <button onClick={()=>askAI('grade')} className="flex-1 bg-purple-600 text-white font-bold rounded-xl flex justify-center items-center gap-2 text-sm">{loadingAI?<Loader2 className="animate-spin" size={16}/>:<Sparkles size={16}/>} Chấm điểm AI</button>}
                                    <button onClick={mode==='fill'?handleAns:()=>{if(idx<questions.length-1)setIdx(idx+1);else onFinish({score, total:questions.length*10})}} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg text-sm">{mode==='fill'?'Kiểm tra':'Tiếp theo'}</button>
                                </div>
                                {aiRes && <div className="mt-4 p-3 bg-purple-50 text-purple-800 rounded border border-purple-200 text-sm text-left">{aiRes}</div>}
                            </div>}
                        </div>
                    </div>
                </div>
            );
        };

        const ResultScreen = ({ score, total, onRetry, onHome }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <div className="w-24 h-24 md:w-32 md:h-32 rounded-full bg-yellow-100 flex items-center justify-center mb-6 shadow-xl animate-bounce"><Trophy size={48} className="text-yellow-600 md:w-16 md:h-16"/></div>
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">Hoàn Thành!</h2>
                <p className="text-lg md:text-xl text-slate-600 mb-8">Điểm số: <span className="text-4xl font-bold text-indigo-600">{score}</span> / {total}</p>
                <div className="flex flex-col w-full max-w-xs gap-3">
                    <button onClick={onRetry} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold flex justify-center items-center gap-2"><RefreshCcw size={20}/> Làm lại</button>
                    <button onClick={onHome} className="w-full py-3 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50">Về Menu</button>
                </div>
            </div>
        );

        const App = () => {
            const [screen, setScreen] = useState('welcome');
            const [user, setUser] = useState(null);
            const [classStructure, setClassStructure] = useState(DEFAULT_CLASS_STRUCTURE);
            const [students, setStudents] = useState([]);
            const [courseModal, setCourseModal] = useState(null);
            const [questionData, setQuestionData] = useState(DEFAULT_QUESTION_BANK);
            const [adminPassword, setAdminPassword] = useState(() => localStorage.getItem('admin_pwd') || 'admin');

            useEffect(() => {
                if (isOnline && db) {
                    const unsubClasses = db.collection('settings').doc('classes').onSnapshot(doc => {
                        if (doc.exists) setClassStructure(doc.data());
                        else db.collection('settings').doc('classes').set(DEFAULT_CLASS_STRUCTURE); 
                    });

                    const unsubStudents = db.collection('students').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setStudents(list);
                    });

                    return () => { unsubClasses(); unsubStudents(); };
                } else {
                    const savedStudents = localStorage.getItem('tinhoc_students');
                    if (savedStudents) setStudents(JSON.parse(savedStudents));
                    
                    const savedClasses = localStorage.getItem('class_structure');
                    if (savedClasses) setClassStructure(JSON.parse(savedClasses));
                }
            }, []);

            const saveStudent = (studentData) => {
                const now = new Date();
                const newItem = { ...studentData, loginTime: now.toLocaleString('vi-VN'), dateKey: now.toLocaleDateString('vi-VN'), lastScore: undefined, pythonReg: null, scratchReg: null };
                
                if (isOnline && db) {
                    db.collection('students').add({ ...newItem, timestamp: firebase.firestore.FieldValue.serverTimestamp() })
                    .then(doc => setUser({ ...newItem, id: doc.id }));
                } else {
                    const list = [newItem, ...students];
                    setStudents(list);
                    localStorage.setItem('tinhoc_students', JSON.stringify(list));
                    setUser(newItem);
                }
            };

            const updateScore = (score) => {
                if (isOnline && user && user.id && db) {
                    db.collection('students').doc(user.id).update({ lastScore: score });
                } else {
                     const updated = students.map(s => (s.loginTime === user.loginTime && s.name === user.name) ? { ...s, lastScore: score } : s);
                     setStudents(updated);
                     localStorage.setItem('tinhoc_students', JSON.stringify(updated));
                }
                setUser({ ...user, lastScore: score });
                setScreen('result');
            };

            const regCourse = (info) => {
                if (isOnline && user && user.id && db) {
                    const field = info.courseType === 'python' ? 'pythonReg' : 'scratchReg';
                    db.collection('students').doc(user.id).update({ [field]: info });
                } else {
                    const updated = students.map(s => (s.loginTime === user.loginTime && s.name === user.name) ? { ...s, [info.courseType === 'python' ? 'pythonReg' : 'scratchReg']: info } : s);
                    setStudents(updated);
                    localStorage.setItem('tinhoc_students', JSON.stringify(updated));
                }
                setCourseModal(null);
                alert("Đăng ký thành công!");
            };

            const updateClasses = (grade, className) => {
                const newStructure = { ...classStructure };
                if (!newStructure[grade]) newStructure[grade] = [];
                if (!newStructure[grade].includes(className)) {
                    newStructure[grade].push(className);
                    newStructure[grade].sort();
                    
                    if (isOnline && db) {
                        db.collection('settings').doc('classes').set(newStructure); 
                    } else {
                        setClassStructure(newStructure);
                        localStorage.setItem('class_structure', JSON.stringify(newStructure));
                    }
                    alert(`Đã thêm lớp ${className}`);
                }
            };

            const deleteHistory = async () => {
                if (confirm("Xóa TOÀN BỘ dữ liệu học sinh? Hành động này không thể hoàn tác!")) {
                    if (isOnline && db) {
                        const snapshot = await db.collection('students').get();
                        const batch = db.batch();
                        snapshot.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    } else {
                        setStudents([]);
                        localStorage.removeItem('tinhoc_students');
                    }
                    alert("Đã xóa sạch dữ liệu.");
                }
            };

            const handleChangeAdminPassword = (newPwd) => { setAdminPassword(newPwd); localStorage.setItem('admin_pwd', newPwd); alert("Đổi mật khẩu thành công!"); };

            const handleLogin = (u) => { 
                const now = new Date();
                const userData = { ...u, loginTime: now.toLocaleString('vi-VN'), dateKey: now.toLocaleDateString('vi-VN') };
                setUser(userData); saveStudent(userData); setScreen('dashboard'); 
            };

            return (
                <div className="font-sans antialiased text-slate-800">
                    {screen === 'welcome' && <WelcomeScreen onLogin={handleLogin} onAdminLogin={()=>setScreen('admin')} adminPassword={adminPassword} classStructure={classStructure} />}
                    {screen === 'admin' && <AdminScreen onBack={()=>setScreen('welcome')} studentList={students} onDeleteHistory={deleteHistory} onUploadData={setQuestionData} onChangePassword={handleChangeAdminPassword} onUpdateClassStructure={updateClasses} classStructure={classStructure} />}
                    {screen === 'dashboard' && user && <Dashboard user={user} onSelectMode={(m)=>{setUser({...user, mode:m}); setScreen('game')}} onLogout={()=>{setUser(null); setScreen('welcome')}} onOpenCourse={setCourseModal}/>}
                    {screen === 'game' && user && <GameScreen user={user} mode={user.mode} onFinish={res=>updateScore(res.score)} onBack={()=>setScreen('dashboard')} questionData={questionData} />}
                    {screen === 'result' && <ResultScreen score={lastResult.score} total={lastResult.total} onRetry={()=>setScreen('game')} onHome={()=>setScreen('dashboard')} />}
                    {courseModal && <CourseRegistrationModal courseType={courseModal} onClose={()=>setCourseModal(null)} onRegister={regCourse} defaultGrade={user?.grade} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
