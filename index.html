<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Dạy & Học Tin Học - Thầy Lê Đình Cương</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            BookOpen, CheckCircle, XCircle, Trophy, User, Smartphone, Play, 
            RefreshCcw, Star, Edit3, HelpCircle, Upload, Download, Loader2, 
            Lock, List, Trash2, LogOut, Database, Code, Monitor, Phone, Key, 
            Gamepad2, X, AlertCircle, Info, Clock, ShieldCheck, FileSpreadsheet,
            ChevronRight, BookMarked, PenTool, Timer
        } from 'lucide-react';
        
        // --- FIREBASE IMPORTS ---
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { 
            getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, 
            setDoc, deleteDoc, query, orderBy, serverTimestamp, getDocs, where
        } from 'firebase/firestore';
        import { getAuth, signInAnonymously } from 'firebase/auth';

        // --- CẤU HÌNH FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyBJuLbMtx4GLsRcj_PO3TU0E4VBhOyJ-yQ",
          authDomain: "dam-me-tin-hoc.firebaseapp.com",
          databaseURL: "https://dam-me-tin-hoc-default-rtdb.firebaseio.com",
          projectId: "dam-me-tin-hoc",
          storageBucket: "dam-me-tin-hoc.firebasestorage.app",
          messagingSenderId: "656467913362",
          appId: "1:656467913362:web:2593c5b816b08f0f9ed44b"
        };

        let db = null;
        let auth = null;

        // --- CONSTANTS ---
        const TERMS = [
            { id: 'GK1', name: 'Giữa Kỳ 1' }, { id: 'CK1', name: 'Cuối Kỳ 1' },
            { id: 'GK2', name: 'Giữa Kỳ 2' }, { id: 'CK2', name: 'Cuối Kỳ 2' }
        ];
        const DEFAULT_CLASS_STRUCTURE = { 6: ["6A1"], 7: ["7A1"], 8: ["8A1"], 9: ["9A1"] };
        const BG_IMG = "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070&auto=format&fit=crop"; 

        // --- COMPONENTS ---
        const Toast = ({ notification, onClose }) => {
            if (!notification) return null;
            const bg = { success: 'bg-emerald-500', error: 'bg-rose-500', info: 'bg-blue-500', warning: 'bg-amber-500' }[notification.type] || 'bg-slate-800';
            const Icon = { success: CheckCircle, error: AlertCircle, info: Info, warning: HelpCircle }[notification.type] || Info;
            return (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-slide-up">
                    <div className={`${bg} text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 min-w-[320px] justify-between`}>
                        <div className="flex items-center gap-2"><Icon size={20} /><span className="font-medium text-sm">{notification.msg}</span></div>
                        <button onClick={onClose} className="hover:bg-white/20 rounded-full p-1 transition"><X size={16}/></button>
                    </div>
                </div>
            );
        };

        const TimerDisplay = ({ initialMinutes, onTimeUp }) => {
            const [timeLeft, setTimeLeft] = useState(initialMinutes * 60);
            useEffect(() => {
                if (timeLeft <= 0) { onTimeUp(); return; }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, onTimeUp]);
            
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const isWarning = timeLeft < 300; // Dưới 5 phút

            return (
                <div className={`flex items-center gap-2 font-mono font-bold text-lg px-4 py-2 rounded-xl ${isWarning ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-100 text-slate-700'}`}>
                    <Clock size={20} />
                    {mins.toString().padStart(2, '0')}:{secs.toString().padStart(2, '0')}
                </div>
            );
        };

        // --- QUẢN TRỊ VIÊN (ADMIN SCREEN) ---
        const AdminScreen = ({ onBack, studentList, classStructure, notify, questionBank, updateQuestionBank }) => {
            const [tab, setTab] = useState('onluyen');
            const [exams, setExams] = useState([]);
            const [smasData, setSmasData] = useState([]);
            const fileInputRef = useRef(null);
            const smasInputRef = useRef(null);
            const examInputRef = useRef(null);
            const [newExam, setNewExam] = useState({ code: '', grade: 8, duration: 45, isAutoSync: true });

            // Fetch Realtime Data for Admin
            useEffect(() => {
                if (!db) return;
                const unsubExams = onSnapshot(collection(db, "exams"), snap => setExams(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubSmas = onSnapshot(collection(db, "smas"), snap => setSmasData(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubExams(); unsubSmas(); };
            }, []);

            // Xử lý Upload file Ôn luyện
            const handleUploadPractice = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = window.XLSX.read(evt.target.result, {type:'binary'});
                        const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        let newBank = { ...questionBank }; // Giữ dữ liệu cũ
                        let count = 0;

                        rows.forEach(r => {
                            const grade = r['Lớp']; const term = r['Kỳ'] || 'GK1'; const type = r['Loại'];
                            if(!grade || !type) return;
                            if(!newBank[grade]) newBank[grade] = {};
                            if(!newBank[grade][term]) newBank[grade][term] = {mcq:[], tf:[], fill:[], essay:[]};
                            
                            const qText = r['Câu hỏi']; const ans = r['Đáp án'];
                            if(type==='TN'){
                                const opts = [r['A'], r['B'], r['C'], r['D']].filter(Boolean);
                                const cIdx = ['A','B','C','D'].indexOf(String(ans).toUpperCase());
                                newBank[grade][term].mcq.push({q: qText, opts, c: cIdx>=0?cIdx:0}); count++;
                            } else if(type==='DS') { newBank[grade][term].tf.push({q: qText, c: String(ans).toLowerCase()==='đúng'}); count++;
                            } else if(type==='DT') { newBank[grade][term].fill.push({q: qText, a: String(ans)}); count++;
                            } else if(type==='TL') { newBank[grade][term].essay.push({q: qText, h: String(ans)}); count++; }
                        });
                        
                        await setDoc(doc(db, "config", "questions"), newBank);
                        notify(`Đã cập nhật ${count} câu hỏi ôn luyện!`, "success");
                    } catch(err) { notify("Lỗi file Excel!", "error"); }
                };
                reader.readAsBinaryString(file);
            };

            // Xử lý Upload Đề Thi Chính Thức
            const handleCreateExam = (e) => {
                const file = e.target.files[0]; if(!file) return;
                if(!newExam.code.trim()) return notify("Vui lòng nhập Mã đề thi trước khi upload!", "warning");
                
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = window.XLSX.read(evt.target.result, {type:'binary'});
                        const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        let examQs = [];
                        
                        rows.forEach(r => {
                            if(r['Loại']==='TN') examQs.push({type: 'mcq', q: r['Câu hỏi'], opts: [r['A'], r['B'], r['C'], r['D']].filter(Boolean), c: ['A','B','C','D'].indexOf(String(r['Đáp án']).toUpperCase())});
                            if(r['Loại']==='DS') examQs.push({type: 'tf', q: r['Câu hỏi'], c: String(r['Đáp án']).toLowerCase()==='đúng'});
                            if(r['Loại']==='DT') examQs.push({type: 'fill', q: r['Câu hỏi'], a: String(r['Đáp án'])});
                        });

                        const examData = { code: newExam.code.toUpperCase(), grade: newExam.grade, duration: newExam.duration, questions: examQs, status: 'active', createdAt: serverTimestamp() };
                        await addDoc(collection(db, "exams"), examData);

                        if(newExam.isAutoSync) {
                            // TODO: Merge into practice bank logic here (Simplified for size limit)
                            notify("Đã tạo đề thi và tạo đề cương tự động!", "success");
                        } else {
                            notify(`Đã tạo phòng thi: ${examData.code} với ${examQs.length} câu`, "success");
                        }
                        setNewExam({...newExam, code: ''});
                    } catch(err) { notify("Lỗi tạo đề thi!", "error"); }
                };
                reader.readAsBinaryString(file);
            };

            // Xử lý Upload SMAS
            const handleUploadSMAS = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = window.XLSX.read(evt.target.result, {type:'binary'});
                        const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        let count = 0;
                        // Batch write simplified
                        for (let r of rows) {
                            if(r['Họ và tên'] && r['Lớp']) {
                                await addDoc(collection(db, "smas"), { name: String(r['Họ và tên']).trim(), className: String(r['Lớp']).trim(), dob: r['Ngày sinh']||'' });
                                count++;
                            }
                        }
                        notify(`Đã đồng bộ ${count} học sinh từ SMAS!`, "success");
                    } catch(err) { notify("Cấu trúc file SMAS không đúng (Cần cột 'Họ và tên', 'Lớp')", "error"); }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex animate-in">
                    {/* Sidebar */}
                    <div className="w-64 bg-indigo-900 text-white flex flex-col shadow-2xl z-10">
                        <div className="p-6 text-center border-b border-indigo-800">
                            <ShieldCheck size={40} className="mx-auto mb-2 text-yellow-400" />
                            <h2 className="font-bold text-lg">LMS Admin</h2>
                            <p className="text-xs text-indigo-300">Giáo viên</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={()=>setTab('onluyen')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${tab==='onluyen'?'bg-indigo-700 font-bold':'hover:bg-indigo-800 text-indigo-200'}`}><BookMarked size={18}/> Ngân hàng Ôn luyện</button>
                            <button onClick={()=>setTab('thi')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${tab==='thi'?'bg-indigo-700 font-bold':'hover:bg-indigo-800 text-indigo-200'}`}><Timer size={18}/> Quản lý Thi Online</button>
                            <button onClick={()=>setTab('smas')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${tab==='smas'?'bg-indigo-700 font-bold':'hover:bg-indigo-800 text-indigo-200'}`}><Users size={18}/> Dữ liệu SMAS</button>
                            <button onClick={()=>setTab('history')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${tab==='history'?'bg-indigo-700 font-bold':'hover:bg-indigo-800 text-indigo-200'}`}><List size={18}/> Bảng điểm</button>
                        </nav>
                        <div className="p-4 border-t border-indigo-800">
                            <button onClick={onBack} className="w-full flex items-center justify-center gap-2 px-4 py-2 bg-indigo-800 hover:bg-rose-600 rounded-xl transition font-bold"><LogOut size={16}/> Thoát</button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 p-8 overflow-y-auto">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                            
                            {/* TAB: ÔN LUYỆN */}
                            {tab === 'onluyen' && (
                                <div className="animate-in">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Database className="text-indigo-600"/> Upload Kho Câu Hỏi Ôn Luyện</h3>
                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-2xl mb-6">
                                        <p className="text-sm text-blue-800 mb-4">File Excel cần có các cột: <b>Lớp, Kỳ (GK1/CK1/GK2/CK2), Loại (TN/DS/DT/TL), Câu hỏi, A, B, C, D, Đáp án</b>.</p>
                                        <div className="flex gap-4">
                                            <button onClick={()=>notify("Vui lòng tự tạo file Excel theo cấu trúc trên.","info")} className="px-6 py-3 bg-white text-blue-700 font-bold rounded-xl border border-blue-200 hover:bg-blue-100 shadow-sm flex items-center gap-2"><Download size={18}/> Tải Mẫu</button>
                                            <button onClick={()=>fileInputRef.current.click()} className="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md flex items-center gap-2"><Upload size={18}/> Upload Data</button>
                                            <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx" onChange={handleUploadPractice}/>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: THI ONLINE */}
                            {tab === 'thi' && (
                                <div className="animate-in">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Timer className="text-rose-500"/> Tổ chức Thi Online (Có đếm ngược)</h3>
                                    <div className="bg-rose-50 border border-rose-100 p-6 rounded-2xl mb-8">
                                        <h4 className="font-bold text-rose-900 mb-4">1. Tạo Mã Đề & Upload Đề Thi</h4>
                                        <div className="grid grid-cols-3 gap-4 mb-4">
                                            <input type="text" placeholder="Nhập Mã Đề (VD: THI_GK1_K7)" value={newExam.code} onChange={e=>setNewExam({...newExam, code: e.target.value})} className="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-rose-400 font-bold uppercase"/>
                                            <select value={newExam.grade} onChange={e=>setNewExam({...newExam, grade: Number(e.target.value)})} className="p-3 border rounded-xl bg-white"><option value={6}>Khối 6</option><option value={7}>Khối 7</option><option value={8}>Khối 8</option><option value={9}>Khối 9</option></select>
                                            <input type="number" placeholder="Thời gian (phút)" value={newExam.duration} onChange={e=>setNewExam({...newExam, duration: Number(e.target.value)})} className="p-3 border rounded-xl"/>
                                        </div>
                                        <label className="flex items-center gap-2 mb-4 text-sm font-medium text-rose-800 cursor-pointer">
                                            <input type="checkbox" checked={newExam.isAutoSync} onChange={e=>setNewExam({...newExam, isAutoSync: e.target.checked})} className="w-5 h-5 rounded text-rose-600"/>
                                            Đồng thời thêm câu hỏi này vào Kho Ôn luyện (Tạo đề cương)
                                        </label>
                                        <button onClick={()=>examInputRef.current.click()} className="w-full py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 shadow-md flex justify-center items-center gap-2"><Upload size={18}/> Chọn File Đề Thi & Tạo Phòng</button>
                                        <input type="file" ref={examInputRef} className="hidden" accept=".xlsx" onChange={handleCreateExam}/>
                                    </div>
                                    
                                    <h4 className="font-bold text-slate-700 mb-4">Các Phòng Thi Đang Mở ({exams.length})</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        {exams.map(e => (
                                            <div key={e.id} className="p-4 border rounded-xl shadow-sm bg-white flex justify-between items-center">
                                                <div>
                                                    <div className="font-mono font-bold text-lg text-indigo-700">{e.code}</div>
                                                    <div className="text-sm text-slate-500">Khối {e.grade} • {e.duration} phút • {e.questions?.length} câu</div>
                                                </div>
                                                <button onClick={()=>deleteDoc(doc(db, "exams", e.id))} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: SMAS */}
                            {tab === 'smas' && (
                                <div className="animate-in">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><FileSpreadsheet className="text-emerald-600"/> Đồng bộ dữ liệu SMAS</h3>
                                    <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-2xl mb-6">
                                        <p className="text-sm text-emerald-800 mb-4">Tính năng này cấp quyền cho học sinh tham gia Thi Online. File Excel xuất từ SMAS cần có các cột: <b>Họ và tên, Lớp</b>.</p>
                                        <div className="flex gap-4">
                                            <button onClick={()=>smasInputRef.current.click()} className="px-6 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 shadow-md flex items-center gap-2"><Upload size={18}/> Tải lên danh sách SMAS</button>
                                            <input type="file" ref={smasInputRef} className="hidden" accept=".xlsx" onChange={handleUploadSMAS}/>
                                        </div>
                                    </div>
                                    <div className="text-sm text-slate-600 font-medium">Hệ thống đang có {smasData.length} học sinh được cấp quyền thi.</div>
                                </div>
                            )}

                            {/* TAB: HISTORY (Giữ nguyên logic cũ, chỉ đổi UI) */}
                            {tab === 'history' && (
                                <div className="animate-in">
                                    <h3 className="text-2xl font-bold text-slate-800 mb-6">Lịch sử Làm Bài</h3>
                                    <div className="overflow-x-auto border border-slate-200 rounded-2xl shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b"><tr><th className="p-4">Học sinh</th><th className="p-4">Lớp</th><th className="p-4">Loại bài</th><th className="p-4 text-right">Điểm</th></tr></thead>
                                            <tbody>
                                                {studentList.slice(0, 50).map(s => (
                                                    <tr key={s.id} className="border-b hover:bg-slate-50">
                                                        <td className="p-4 font-bold text-indigo-900">{s.name}</td>
                                                        <td className="p-4"><span className="bg-indigo-100 text-indigo-800 px-2 py-1 rounded-md text-xs font-bold">{s.className}</span></td>
                                                        <td className="p-4 text-slate-600 text-sm">{s.examCode ? `Thi: ${s.examCode}` : 'Ôn luyện tự do'}</td>
                                                        <td className="p-4 text-right font-black text-emerald-600">{s.lastScore!==undefined ? s.lastScore : '-'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD (HỌC SINH) ---
        const Dashboard = ({ user, onStartPractice, onStartExam, onLogout }) => {
            const [examCode, setExamCode] = useState('');
            const [selectedTerm, setSelectedTerm] = useState('GK1');
            const [checkingSMAS, setCheckingSMAS] = useState(false);

            const handleEnterExam = async () => {
                if(!examCode.trim()) return alert("Vui lòng nhập mã đề!");
                setCheckingSMAS(true);
                try {
                    // Kiểm tra SMAS
                    const qSmas = query(collection(db, "smas"), where("name", "==", user.name), where("className", "==", user.className));
                    const smasSnap = await getDocs(qSmas);
                    if(smasSnap.empty) {
                        alert("Em không có trong danh sách dự thi (Dữ liệu SMAS không khớp). Vui lòng báo Giám thị!");
                        setCheckingSMAS(false); return;
                    }

                    // Kiểm tra Mã đề
                    const qExam = query(collection(db, "exams"), where("code", "==", examCode.toUpperCase().trim()));
                    const examSnap = await getDocs(qExam);
                    if(examSnap.empty) {
                        alert("Mã đề không tồn tại hoặc đã bị khóa!");
                        setCheckingSMAS(false); return;
                    }

                    const examData = examSnap.docs[0].data();
                    if(examData.grade !== user.grade) {
                        alert(`Mã đề này dành cho khối ${examData.grade}, em đang học khối ${user.grade}!`);
                        setCheckingSMAS(false); return;
                    }

                    onStartExam(examData);
                } catch(e) { alert("Lỗi kết nối!"); }
                setCheckingSMAS(false);
            };

            return (
                <div className="min-h-screen bg-slate-100 animate-in pb-10">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-xl shadow-lg">{user.grade}</div>
                            <div><h2 className="font-bold text-xl text-slate-800">{user.name}</h2><p className="text-sm text-slate-500 font-medium">Lớp {user.className}</p></div>
                        </div>
                        <button onClick={onLogout} className="flex items-center gap-2 text-slate-500 hover:text-rose-600 hover:bg-rose-50 px-4 py-2 rounded-xl transition font-medium"><LogOut size={18}/> Thoát</button>
                    </header>

                    <div className="max-w-5xl mx-auto mt-8 px-4 grid md:grid-cols-2 gap-8">
                        {/* KHU VỰC THI ONLINE */}
                        <div className="bg-white rounded-3xl p-8 shadow-xl border border-rose-100 relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-rose-50 rounded-full blur-3xl -mr-20 -mt-20 z-0"></div>
                            <div className="relative z-10">
                                <div className="inline-flex items-center justify-center p-3 bg-rose-100 text-rose-600 rounded-2xl mb-6"><Timer size={32}/></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-2">Phòng Thi Online</h2>
                                <p className="text-slate-500 mb-8">Nhập mã đề giáo viên cung cấp để bắt đầu làm bài kiểm tra chính thức.</p>
                                
                                <div className="space-y-4">
                                    <input type="text" value={examCode} onChange={e=>setExamCode(e.target.value)} placeholder="Nhập Mã Đề..." className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl font-mono font-bold text-center text-xl outline-none focus:border-rose-400 focus:bg-white transition uppercase"/>
                                    <button onClick={handleEnterExam} disabled={checkingSMAS} className="w-full py-4 bg-gradient-to-r from-rose-500 to-red-600 text-white font-bold text-lg rounded-2xl shadow-lg shadow-rose-500/30 hover:shadow-rose-500/50 hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
                                        {checkingSMAS ? <Loader2 className="animate-spin"/> : <Play fill="currentColor"/>} VÀO THI NGAY
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* KHU VỰC ÔN LUYỆN */}
                        <div className="bg-white rounded-3xl p-8 shadow-xl border border-indigo-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-50 rounded-full blur-3xl -mr-20 -mt-20 z-0"></div>
                            <div className="relative z-10">
                                <div className="inline-flex items-center justify-center p-3 bg-indigo-100 text-indigo-600 rounded-2xl mb-6"><BookOpen size={32}/></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-2">Góc Ôn Luyện</h2>
                                <p className="text-slate-500 mb-6">Chọn kỳ thi và dạng bài để luyện tập không giới hạn thời gian.</p>
                                
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {TERMS.map(t => (
                                        <button key={t.id} onClick={()=>setSelectedTerm(t.id)} className={`p-3 rounded-xl font-bold border-2 transition ${selectedTerm===t.id ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-slate-100 text-slate-500 hover:border-slate-300'}`}>{t.name}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    {[{id:'mcq',n:'Trắc Nghiệm', i:<CheckCircle size={18}/>},{id:'tf',n:'Đúng / Sai', i:<HelpCircle size={18}/>},{id:'fill',n:'Điền Khuyết', i:<Edit3 size={18}/>},{id:'essay',n:'Tự Luận', i:<PenTool size={18}/>}].map(m => (
                                        <button key={m.id} onClick={()=>onStartPractice(selectedTerm, m.id)} className="flex items-center gap-2 p-4 bg-slate-50 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 font-semibold text-slate-700 transition group">
                                            <span className="text-slate-400 group-hover:text-indigo-500">{m.i}</span> {m.n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- GAME/EXAM SCREEN ---
        const PlayScreen = ({ user, examMode, term, mode, examData, onFinish, onBack, questionBank }) => {
            const [qIdx, setQIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [inputVal, setInputVal] = useState("");
            const [feedback, setFeedback] = useState(null); // Chỉ dùng cho Ôn luyện
            
            // Nếu là thi Online, lấy câu hỏi từ examData. Nếu ôn luyện, lấy từ questionBank
            const questions = examMode ? (examData?.questions || []) : (questionBank?.[user.grade]?.[term]?.[mode] || []);
            const q = questions[qIdx];

            const handleAutoSubmit = () => { onFinish({score, total: questions.length*10, examCode: examData?.code}); };

            if(!q) return <div className="min-h-screen flex items-center justify-center flex-col bg-slate-50"><p className="text-xl font-medium text-slate-500 mb-4">Chưa có câu hỏi cho phần này.</p><button onClick={onBack} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700">Quay lại</button></div>;

            const handleAnswer = (ans) => {
                if(feedback && !examMode) return; // Chống click đúp khi đang hiện kết quả ôn luyện

                let isCorrect = false;
                const type = examMode ? q.type : mode;

                if (type === 'mcq' || type === 'tf') isCorrect = (ans === q.c);
                else isCorrect = (inputVal.toLowerCase().trim() === (q.a || '').toLowerCase().trim());

                if (isCorrect) setScore(prev => prev + 10);

                if (examMode) {
                    // Chế độ THI: Chuyển câu luôn, không hiện đúng sai
                    if (qIdx < questions.length - 1) { setQIdx(qIdx + 1); setInputVal(""); }
                    else handleAutoSubmit();
                } else {
                    // Chế độ ÔN LUYỆN: Hiện thông báo đúng sai rồi mới chuyển câu
                    setFeedback(isCorrect ? 'correct' : 'wrong');
                    setTimeout(() => {
                        if (qIdx < questions.length - 1) { setQIdx(qIdx + 1); setInputVal(""); setFeedback(null); }
                        else onFinish({score: isCorrect ? score + 10 : score, total: questions.length*10});
                    }, isCorrect ? 1000 : 2500);
                }
            };

            const currentType = examMode ? q.type : mode;

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col animate-in">
                    {/* Header: Hiển thị Timer nếu đang thi */}
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center px-6 sticky top-0 z-30">
                        <button onClick={()=>{ if(examMode && !confirm("Đang thi! Nộp bài sớm?")) return; onBack();}} className="text-slate-400 hover:text-slate-600"><XCircle size={28}/></button>
                        
                        {examMode ? <TimerDisplay initialMinutes={examData.duration} onTimeUp={handleAutoSubmit} /> 
                                  : <div className="font-bold text-indigo-800 bg-indigo-50 px-4 py-2 rounded-xl">Ôn luyện {term}</div>}
                        
                        <div className="flex items-center gap-4">
                            <span className="font-bold text-slate-700">Câu {qIdx+1}/{questions.length}</span>
                        </div>
                    </div>

                    <div className="flex-1 p-4 max-w-3xl mx-auto w-full flex flex-col justify-center">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full relative overflow-hidden">
                            {/* Hiệu ứng Đúng Sai (Chỉ Ôn luyện) */}
                            {!examMode && feedback === 'correct' && <div className="absolute inset-0 bg-emerald-500/95 flex items-center justify-center z-20 text-white text-4xl font-black animate-in"><CheckCircle size={80} className="mr-4"/> ĐÚNG!</div>}
                            {!examMode && feedback === 'wrong' && <div className="absolute inset-0 bg-rose-500/95 flex flex-col items-center justify-center z-20 text-white animate-in p-8"><XCircle size={80} className="mb-4"/><h2 className="text-4xl font-black mb-4">SAI RỒI</h2><div className="bg-white/20 p-4 rounded-2xl text-xl font-medium">Đáp án: {currentType === 'mcq' ? q.opts[q.c] : currentType === 'tf' ? (q.c ? "ĐÚNG" : "SAI") : q.a}</div></div>}

                            <h2 className="text-2xl md:text-3xl font-bold text-slate-800 leading-snug mb-8">{q.q}</h2>
                            
                            <div className="w-full">
                                {currentType==='mcq' && <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{q.opts.map((o,i)=><button key={i} onClick={()=>handleAnswer(i)} className="p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-semibold hover:border-indigo-500 hover:bg-indigo-50 text-left flex gap-4 text-base md:text-lg transition-all"><span className="text-indigo-600 font-black bg-indigo-100 w-8 h-8 rounded-full flex items-center justify-center shrink-0">{String.fromCharCode(65+i)}</span> {o}</button>)}</div>}
                                {currentType==='tf' && <div className="grid grid-cols-2 gap-6"><button onClick={()=>handleAnswer(true)} className="py-8 bg-emerald-50 border-2 border-emerald-200 rounded-3xl font-black text-emerald-600 hover:bg-emerald-100 text-2xl transition">ĐÚNG</button><button onClick={()=>handleAnswer(false)} className="py-8 bg-rose-50 border-2 border-rose-200 rounded-3xl font-black text-rose-600 hover:bg-rose-100 text-2xl transition">SAI</button></div>}
                                {(currentType==='fill' || currentType==='essay') && <div className="flex flex-col gap-4">
                                    {currentType==='fill' ? <input type="text" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-5 border-2 border-slate-200 rounded-2xl text-center text-xl font-bold text-indigo-900 outline-none focus:border-indigo-500 bg-slate-50" placeholder="Nhập đáp án..."/> : <textarea rows="5" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-5 border-2 border-slate-200 rounded-2xl text-lg outline-none focus:border-indigo-500 bg-slate-50" placeholder="Trình bày câu trả lời..."/>}
                                    <button onClick={handleAnswer} className="w-full bg-indigo-600 text-white font-black text-lg py-4 rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition mt-2">Nộp Câu Trả Lời</button>
                                </div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const WelcomeScreen = ({ onLogin, onAdminLogin, classStructure }) => {
            const [name, setName] = useState("");
            const [grade, setGrade] = useState(8);
            const [className, setClassName] = useState("");
            const [showAdmin, setShowAdmin] = useState(false);
            const [pwd, setPwd] = useState("");

            useEffect(() => { setClassName(classStructure[grade]?.[0] || ""); }, [grade, classStructure]);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative" style={{background: `url(${BG_IMG}) center/cover`}}>
                    <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm z-0"></div>
                    <button onClick={()=>setShowAdmin(true)} className="absolute top-6 right-6 text-white/50 hover:text-white z-20"><ShieldCheck size={28}/></button>

                    {showAdmin && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
                            <div className="bg-white p-6 rounded-2xl w-80 text-center animate-in">
                                <ShieldCheck size={40} className="mx-auto mb-4 text-indigo-600"/>
                                <h3 className="font-bold text-lg mb-4">Đăng nhập Admin</h3>
                                <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Mật khẩu" className="w-full p-3 border rounded-xl mb-4 text-center font-mono outline-none focus:border-indigo-500"/>
                                <div className="flex gap-2"><button onClick={()=>setShowAdmin(false)} className="flex-1 bg-slate-100 py-3 rounded-xl font-bold text-slate-600">Hủy</button><button onClick={()=>{if(pwd==='admin') onAdminLogin(); else alert('Sai mật khẩu!');}} className="flex-1 bg-indigo-600 py-3 rounded-xl font-bold text-white shadow-lg shadow-indigo-200">Vào</button></div>
                            </div>
                        </div>
                    )}

                    <div className="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md relative z-10 animate-slide-up border-t border-white/40">
                        <div className="w-24 h-24 bg-gradient-to-tr from-yellow-400 to-orange-500 rounded-full mx-auto mb-6 flex items-center justify-center shadow-xl shadow-orange-500/20"><Monitor size={48} className="text-white"/></div>
                        <h1 className="text-2xl md:text-3xl font-black text-center text-white mb-2 tracking-tight">TIN HỌC THẦY CƯƠNG</h1>
                        <p className="text-center text-indigo-200 font-medium mb-8">Hệ thống Ôn Luyện & Thi Online</p>

                        <div className="space-y-4">
                            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Họ và tên của em..." className="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-white/50 font-bold text-lg focus:outline-none focus:bg-white/20 focus:border-white/40 transition"/>
                            <div className="grid grid-cols-2 gap-4">
                                <select value={grade} onChange={e=>setGrade(Number(e.target.value))} className="p-4 rounded-2xl bg-white/10 border border-white/20 text-white font-bold focus:outline-none focus:bg-slate-800"><option value={6} className="text-slate-800">Khối 6</option><option value={7} className="text-slate-800">Khối 7</option><option value={8} className="text-slate-800">Khối 8</option><option value={9} className="text-slate-800">Khối 9</option></select>
                                <select value={className} onChange={e=>setClassName(e.target.value)} className="p-4 rounded-2xl bg-white/10 border border-white/20 text-white font-bold focus:outline-none focus:bg-slate-800">{classStructure[grade]?.map(c=><option key={c} value={c} className="text-slate-800">{c}</option>)}</select>
                            </div>
                            <button onClick={()=>name.trim() ? onLogin({name, grade, className}) : alert('Nhập tên!')} className="w-full py-4 mt-2 bg-white text-indigo-900 font-black text-lg rounded-2xl shadow-xl hover:scale-105 transition-transform flex items-center justify-center gap-2"><ChevronRight size={24}/> Bắt Đầu</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [screen, setScreen] = useState('welcome');
            const [gameSetup, setGameSetup] = useState(null); // { isExam: boolean, term?: string, mode?: string, examData?: object }
            const [lastResult, setLastResult] = useState({ score: 0, total: 0 });
            const [notification, setNotification] = useState(null);
            const [dbData, setDbData] = useState({ qBank: {}, smas: [], students: [] });
            
            useEffect(() => {
                const init = async () => {
                    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
                    auth = getAuth(app); db = getFirestore(app);
                    await signInAnonymously(auth).catch(e => console.error("Auth error", e));
                    
                    // Listeners
                    onSnapshot(doc(db, "config", "questions"), snap => setDbData(p => ({...p, qBank: snap.data()||{}})));
                    onSnapshot(query(collection(db, "students"), orderBy("createdAt", "desc")), snap => setDbData(p => ({...p, students: snap.docs.map(d=>({id:d.id,...d.data()}))})));
                };
                init();
            }, []);

            const notify = (msg, type='info') => { setNotification({msg, type}); setTimeout(() => setNotification(null), 3000); };

            const handleLogin = async (userData) => {
                const uData = { ...userData, loginTime: new Date().toLocaleString('vi-VN'), createdAt: serverTimestamp() };
                const docRef = await addDoc(collection(db, "students"), uData);
                setUser({ ...uData, id: docRef.id });
                setScreen('dashboard');
            };

            const handleFinish = async (res) => {
                setLastResult(res);
                if(user?.id) await updateDoc(doc(db, "students", user.id), { lastScore: res.score, examCode: res.examCode || 'Ôn Luyện' });
                setScreen('result');
            };

            return (
                <div>
                    <Toast notification={notification} onClose={() => setNotification(null)} />
                    {screen === 'welcome' && <WelcomeScreen onLogin={handleLogin} onAdminLogin={()=>setScreen('admin')} classStructure={DEFAULT_CLASS_STRUCTURE} />}
                    {screen === 'admin' && <AdminScreen onBack={()=>setScreen('welcome')} studentList={dbData.students} classStructure={DEFAULT_CLASS_STRUCTURE} questionBank={dbData.qBank} notify={notify}/>}
                    {screen === 'dashboard' && <Dashboard user={user} onLogout={()=>{setUser(null); setScreen('welcome');}} 
                        onStartPractice={(term, mode) => { setGameSetup({isExam: false, term, mode}); setScreen('play'); }}
                        onStartExam={(examData) => { setGameSetup({isExam: true, examData}); setScreen('play'); }}
                    />}
                    {screen === 'play' && <PlayScreen user={user} examMode={gameSetup.isExam} term={gameSetup.term} mode={gameSetup.mode} examData={gameSetup.examData} questionBank={dbData.qBank} onFinish={handleFinish} onBack={()=>setScreen('dashboard')} />}
                    {screen === 'result' && (
                        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center animate-in">
                            <div className="w-40 h-40 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-500 flex items-center justify-center mb-8 shadow-2xl shadow-yellow-500/40 animate-bounce"><Trophy size={80} className="text-white"/></div>
                            <h2 className="text-4xl font-black text-slate-800 mb-4">{gameSetup?.isExam ? 'Đã Nộp Bài!' : 'Hoàn Thành!'}</h2>
                            <div className="bg-white p-8 rounded-3xl shadow-xl mb-8 w-full max-w-sm border border-slate-100">
                                <p className="text-slate-400 mb-2 font-bold uppercase tracking-widest">Điểm của em</p>
                                <p className="text-6xl font-black text-indigo-600">{lastResult.score} <span className="text-2xl text-slate-300">/ {lastResult.total}</span></p>
                            </div>
                            <button onClick={()=>setScreen('dashboard')} className="w-full max-w-sm py-4 bg-slate-800 text-white rounded-2xl font-bold text-lg hover:bg-slate-900 shadow-xl transition">Về Màn Hình Chính</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
