        const callGeminiAPI = async (prompt) => {
            const apiKey = ""; // API Key
            try {
                const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                }
                );
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI đang bận, em hãy thử lại sau nhé!";
            } catch (error) {
                console.error("AI Error:", error);
                return "Không thể kết nối với AI. Vui lòng kiểm tra mạng.";
            }

                            <p className="text-slate-300 text-xs md:text-sm">
                                {isScratch 
                                ? "Tự tay làm game, phim hoạt hình và thiệp điện tử." 
                                : "Thực hành dự án thực tế: Game Snake, Máy tính bỏ túi, Vẽ hình học."}
                            </p>
                            </div>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-3 md:space-y-4">
                            <div>
                            <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Họ và tên học sinh</label>
                            <input 
                                type="text" 
                                required
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent focus:outline-none"
                                placeholder="Nhập họ và tên..."
                            />
                            </div>
                            <div>
                            <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Đăng ký chương trình Khối</label>
                            <div className="grid grid-cols-4 gap-2">
                                {[6, 7, 8, 9].map(g => (
                                <button
                                    key={g}
                                    type="button"
                                    onClick={() => setRegGrade(g)}
                                    className={`py-2 rounded-lg font-bold border text-sm md:text-base transition-all ${regGrade === g ? 'bg-yellow-400 text-slate-900 border-yellow-400' : 'bg-transparent text-slate-400 border-slate-600 hover:border-slate-400'}`}
                                >
                                    Lớp {g}
                                </button>
                                ))}
                            </div>
                            </div>

                            <div>
                            <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Số điện thoại liên hệ (Zalo)</label>
                            <input 
                                type="tel" 
                                required
                                value={phone}
                                onChange={(e) => setPhone(e.target.value)}
                                className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent focus:outline-none"
                                placeholder="Nhập số điện thoại..."
                            />
                            </div>
                            <div>
                            <label className="block text-xs md:text-sm font-bold text-slate-400 mb-1">Email (Không bắt buộc)</label>
                            <input 
                                type="email" 
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                className="w-full bg-slate-800 border border-slate-600 rounded-xl px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-white focus:ring-2 focus:ring-cyan-500 focus:border-transparent focus:outline-none"
                                placeholder="email@example.com"
                            />
                            </div>
                            <button 
                            type="submit" 
                            className={`w-full py-3 md:py-4 bg-gradient-to-r ${gradient} text-white font-bold text-base md:text-lg rounded-xl hover:shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-2 mt-2 md:mt-4`}
                            >
                            <Edit3 size={18} className="md:w-5 md:h-5" /> XÁC NHẬN ĐĂNG KÝ
                            </button>
                        </form>
                        </>
                    ) : (
                        <div className="text-center py-6 md:py-8">
                        <div className="w-16 h-16 md:w-20 md:h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <CheckCircle size={32} className="md:w-10 md:h-10 text-green-400" />
                        </div>
                        <h3 className="text-xl md:text-2xl font-bold text-white mb-2">Đăng ký thành công!</h3>
                        <p className="text-slate-400 text-sm md:text-base mb-6">Em <strong>{studentName}</strong> đã đăng ký khóa <strong>{title} - Lớp {regGrade}</strong>.<br/>Thầy sẽ liên hệ qua SĐT <strong>{phone}</strong>.</p>
                        <button onClick={onClose} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-bold text-sm md:text-base">Đóng</button>
                        </div>
                    )}
                    </div>
                </div>
                </div>
            );
        };

        // 2. Admin Change Password Modal
        const ChangePasswordModal = ({ onClose, onChangePassword }) => {
            const [newPwd, setNewPwd] = useState("");
            const [confirmPwd, setConfirmPwd] = useState("");
            const [error, setError] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (newPwd.length < 4) return setError("Mật khẩu phải có ít nhất 4 ký tự.");
                if (newPwd !== confirmPwd) return setError("Mật khẩu xác nhận không khớp.");
                onChangePassword(newPwd);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-in fade-in">
                <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm animate-in zoom-in-95">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <Key size={20} className="text-indigo-600" /> Đổi Mật Khẩu Admin
                    </h3>
                    <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-semibold text-slate-600 mb-1">Mật khẩu mới</label>
                        <input 
                            type="password" 
                            value={newPwd}
                            onChange={(e) => setNewPwd(e.target.value)}
                            className="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            autoFocus
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-semibold text-slate-600 mb-1">Xác nhận mật khẩu</label>
                        <input 
                            type="password" 
                            value={confirmPwd}
                            onChange={(e) => setConfirmPwd(e.target.value)}
                            className="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        />
                    </div>
                    {error && <p className="text-red-500 text-sm">{error}</p>}
                    <div className="flex gap-2 pt-2">
                        <button type="button" onClick={onClose} className="flex-1 py-2 bg-slate-100 text-slate-600 font-bold rounded-lg hover:bg-slate-200">Hủy</button>
                        <button type="submit" className="flex-1 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">Lưu</button>
                    </div>
                    </form>
                </div>
                </div>
            );
        };

        // 3. Admin Screen
        const AdminScreen = ({ onBack, studentList, onDeleteHistory, onUploadData, onChangePassword, onUpdateClassStructure, classStructure }) => {
            const [activeTab, setActiveTab] = useState('history');
            const [filterGrade, setFilterGrade] = useState('ALL');
            const [filterDate, setFilterDate] = useState('ALL');
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [newClassInput, setNewClassInput] = useState({ grade: 6, name: "" }); // State cho thêm lớp
            const fileInputRef = useRef(null);

            const handleDownloadTemplate = () => {
                if (!window.XLSX) return alert("Lỗi thư viện Excel. Vui lòng tải lại trang.");
                const rows = [["Lớp","Loại","Câu hỏi","A","B","C","D","Đáp án"],[8,"TN","Tin học ứng dụng lĩnh vực nào?","Y tế","Giáo dục","Quốc phòng","Cả 3","D"]];
                const wb = window.XLSX.utils.book_new();
                const ws = window.XLSX.utils.aoa_to_sheet(rows);
                window.XLSX.utils.book_append_sheet(wb, ws, "Mau");
                window.XLSX.writeFile(wb, "Mau_Cau_Hoi.xlsx");
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const wb = window.XLSX.read(data, {type:'array'});
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(ws, {header:1});
                        const newBank = JSON.parse(JSON.stringify(DEFAULT_QUESTION_BANK));
                        json.slice(1).forEach((row, i) => {
                            if(!row[0] || !row[2]) return;
                            const g = row[0].toString();
                            const type = row[1];
                            if(!newBank[g]) newBank[g] = {mcq:[], tf:[], fill:[], essay:[]};
                            if(type==='TN') newBank[g].mcq.push({id: Date.now()+i, question: row[2], options: [row[3],row[4],row[5],row[6]], correct: ['A','B','C','D'].indexOf(row[7])});
                            else if(type==='DS') newBank[g].tf.push({id: Date.now()+i, question: row[2], correct: ['đúng','true','đ'].includes(row[7]?.toLowerCase())});
                            else if(type==='DK') newBank[g].fill.push({id: Date.now()+i, question: row[2], answer: row[7]});
                            else if(type==='TL') newBank[g].essay.push({id: Date.now()+i, question: row[2], hint: row[7]});
                        });
                        onUploadData(newBank);
                        alert("Cập nhật thành công!");
                    } catch (err) { console.error(err); alert("Lỗi đọc file!"); }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null;
            };

            const handleAddClass = () => {
                if (!newClassInput.name.trim()) return alert("Vui lòng nhập tên lớp!");
                onUpdateClassStructure(newClassInput.grade, newClassInput.name.trim());
                setNewClassInput({ ...newClassInput, name: "" }); // Reset input
            };

            const uniqueDates = Array.from(new Set(studentList.map(s => s.dateKey || "N/A")));
            const filteredList = studentList.filter(s => 
                (filterGrade === 'ALL' || s.grade.toString() === filterGrade) &&
                (filterDate === 'ALL' || s.dateKey === filterDate)
            );
            const pythonStudents = studentList.filter(s => s.pythonReg);
            const scratchStudents = studentList.filter(s => s.scratchReg);

            return (
                <div className="min-h-screen bg-slate-100 p-2 md:p-6">
                    <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
                        <div className="bg-indigo-900 p-4 md:p-6 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-yellow-400 p-2 rounded-lg text-indigo-900"><Lock size={24}/></div>
                                <div><h2 className="text-xl md:text-2xl font-bold">Quản Trị</h2><p className="text-indigo-200 text-sm">Thống kê & Quản lý</p></div>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={() => setShowPwdModal(true)} className="flex-1 md:flex-none bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg flex justify-center items-center gap-2 text-sm"><Key size={16}/> Mật khẩu</button>
                                <button onClick={onBack} className="flex-1 md:flex-none bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg flex justify-center items-center gap-2 text-sm"><LogOut size={16}/> Thoát</button>
                            </div>
                        </div>
                        {showPwdModal && <ChangePasswordModal onClose={() => setShowPwdModal(false)} onChangePassword={onChangePassword} />}
                        
                        <div className="p-4 md:p-6">
                            <div className="grid md:grid-cols-2 gap-4 mb-6">
                                <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl">
                                    <h3 className="font-bold text-blue-900 flex gap-2 mb-2"><Database size={18}/> Quản lý Câu hỏi (Excel)</h3>
                                    <div className="flex gap-2">
                                        <button onClick={handleDownloadTemplate} className="flex-1 px-3 py-2 bg-white border rounded shadow-sm text-sm font-bold flex justify-center items-center gap-1"><Download size={14}/> Mẫu</button>
                                        <button onClick={() => fileInputRef.current.click()} className="flex-1 px-3 py-2 bg-blue-600 text-white rounded shadow-sm text-sm font-bold flex justify-center items-center gap-1"><Upload size={14}/> Upload</button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx" onChange={handleFileChange}/>
                                    </div>
                                </div>
                                <div className="p-4 bg-green-50 border border-green-200 rounded-xl">
                                    <h3 className="font-bold text-green-900 flex gap-2 mb-2"><Plus size={18}/> Thêm Lớp Mới</h3>
                                    <div className="flex gap-2">
                                        <select 
                                            value={newClassInput.grade} 
                                            onChange={(e) => setNewClassInput({...newClassInput, grade: Number(e.target.value)})} 
                                            className="border rounded px-2 py-1 text-sm"
                                        >
                                            <option value={6}>K6</option><option value={7}>K7</option><option value={8}>K8</option><option value={9}>K9</option>
                                        </select>
                                        <input 
                                            type="text" 
                                            placeholder="Tên lớp (VD: 8A5)" 
                                            value={newClassInput.name}
                                            onChange={(e) => setNewClassInput({...newClassInput, name: e.target.value})}
                                            className="flex-1 border rounded px-2 py-1 text-sm"
                                        />
                                        <button onClick={handleAddClass} className="bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">Thêm</button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-2 mb-4 border-b pb-2 overflow-x-auto no-scrollbar">
                                <button onClick={() => setActiveTab('history')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='history'?'bg-indigo-100 text-indigo-700':'text-slate-500'}`}><List size={16}/> Lịch sử</button>
                                <button onClick={() => setActiveTab('python')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='python'?'bg-yellow-100 text-yellow-700':'text-slate-500'}`}><Code size={16}/> Python ({pythonStudents.length})</button>
                                <button onClick={() => setActiveTab('scratch')} className={`whitespace-nowrap px-3 py-2 font-bold text-sm rounded-lg flex gap-2 items-center ${activeTab==='scratch'?'bg-orange-100 text-orange-700':'text-slate-500'}`}><Gamepad2 size={16}/> Scratch ({scratchStudents.length})</button>
                            </div>

                            {activeTab === 'history' && (
                                <div>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)} className="border p-2 rounded text-sm w-full md:w-auto"><option value="ALL">Tất cả Khối</option><option value="6">Khối 6</option><option value="7">Khối 7</option><option value="8">Khối 8</option><option value="9">Khối 9</option></select>
                                        <select value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="border p-2 rounded text-sm w-full md:w-auto"><option value="ALL">Tất cả Ngày</option>{uniqueDates.map(d=><option key={d} value={d}>{d}</option>)}</select>
                                        <button onClick={onDeleteHistory} className="ml-auto text-red-500 border border-red-200 px-3 py-2 rounded hover:bg-red-50 text-sm flex items-center gap-1"><Trash2 size={16}/> Xóa lịch sử</button>
                                    </div>
                                    <div className="overflow-x-auto border rounded-xl">
                                        <table className="w-full text-left min-w-[600px]">
                                            <thead className="bg-slate-50 border-b"><tr><th className="p-3">Tên</th><th className="p-3">Lớp</th><th className="p-3">Ngày</th><th className="p-3 text-right">Điểm</th></tr></thead>
                                            <tbody>
                                                {filteredList.map((s,i) => (
                                                    <tr key={i} className="border-b hover:bg-slate-50 text-sm">
                                                        <td className="p-3 font-bold text-indigo-900">{s.name}</td>
                                                        <td className="p-3"><span className="bg-blue-100 px-2 py-1 rounded text-xs font-bold text-blue-800">{s.className}</span></td>
                                                        <td className="p-3 text-slate-500">{s.loginTime}</td>
                                                        <td className="p-3 text-right font-bold text-green-600">{s.lastScore||'-'}</td>
                                                    </tr>
                                                ))}
                                                {filteredList.length === 0 && <tr><td colSpan="4" className="p-4 text-center text-slate-400 text-sm">Chưa có dữ liệu</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {(activeTab === 'python' || activeTab === 'scratch') && (
                                <div className="overflow-x-auto border rounded-xl">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead className={`border-b ${activeTab==='python'?'bg-yellow-50':'bg-orange-50'}`}>
                                            <tr><th className="p-3">Họ Tên</th><th className="p-3">Lớp (Trường)</th><th className="p-3">Đăng ký</th><th className="p-3">SĐT</th><th className="p-3">Ngày ĐK</th></tr>
                                        </thead>
                                        <tbody>
                                            {(activeTab==='python' ? pythonStudents : scratchStudents).map((s,i) => {
                                                const reg = activeTab==='python' ? s.pythonReg : s.scratchReg;
                                                return (
                                                    <tr key={i} className="border-b hover:bg-slate-50 text-sm">
                                                        <td className="p-3 font-bold">{reg.studentName}</td>
                                                        <td className="p-3">{s.className}</td>
                                                        <td className="p-3"><span className="font-bold border px-2 py-1 rounded bg-white">Lớp {reg.regGrade}</span></td>
                                                        <td className="p-3 font-mono text-indigo-600">{reg.phone}</td>
                                                        <td className="p-3 text-slate-500">{s.dateKey}</td>
                                                    </tr>
                                                );
                                            })}
                                            {(activeTab==='python' ? pythonStudents : scratchStudents).length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Chưa có đăng ký nào.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 4. Welcome Screen
        const WelcomeScreen = ({ onLogin, onAdminLogin, adminPassword, classStructure }) => {
            const [name, setName] = useState("");
            const [grade, setGrade] = useState(8);
            const [className, setClassName] = useState("");
            const [isPhoneLogin, setIsPhoneLogin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPwdInput, setAdminPwdInput] = useState("");
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (classStructure[grade] && classStructure[grade].length > 0) {
                    setClassName(classStructure[grade][0]);
                } else {
                    setClassName(""); // Handle case with no classes
                }
            }, [grade, classStructure]);

            const handleAdminSubmit = (e) => {
                e.preventDefault();
                if (adminPwdInput === adminPassword) {
                    onAdminLogin();
                    setShowAdminModal(false);
                } else setErrorMsg("Sai mật khẩu!");
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 text-white relative bg-cover bg-center" style={{backgroundImage: `url('${BACKGROUND_IMAGE}')`, backgroundColor: '#1e293b'}}>
                    <div className="absolute inset-0 bg-slate-900/60 z-0"></div>
                    <button onClick={() => setShowAdminModal(true)} className="absolute top-4 right-4 bg-white/10 p-2 rounded-full hover:bg-white/20 z-20"><Lock size={20}/></button>

                    {showAdminModal && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <div className="bg-white text-slate-900 p-6 rounded-xl w-full max-w-sm">
                                <h3 className="text-xl font-bold mb-4">Đăng nhập Quản trị</h3>
                                <form onSubmit={handleAdminSubmit}>
                                    <input type="password" value={adminPwdInput} onChange={e=>{setAdminPwdInput(e.target.value); setErrorMsg("")}} className="w-full border p-2 rounded mb-2" placeholder="Mật khẩu" autoFocus/>
                                    {errorMsg && <p className="text-red-500 text-sm mb-2">{errorMsg}</p>}
                                    <div className="flex gap-2"><button type="button" onClick={()=>setShowAdminModal(false)} className="flex-1 bg-slate-200 py-2 rounded font-bold">Hủy</button><button type="submit" className="flex-1 bg-indigo-600 text-white py-2 rounded font-bold">Vào</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="bg-white/10 backdrop-blur-md p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/20 relative z-10 animate-in slide-in-from-bottom-8 duration-500">
                        <div className="text-center mb-6 md:mb-8">
                            <div className="bg-gradient-to-tr from-yellow-400 to-orange-500 w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg animate-bounce"><Monitor size={40} className="text-white md:w-12 md:h-12"/></div>
                            <h1 className="text-xl md:text-2xl font-bold mb-2 text-white uppercase leading-snug drop-shadow-lg">
                                ĐAM MÊ TIN HỌC VỚI THẦY LÊ ĐÌNH CƯƠNG<br/>
                                TRƯỜNG THCS CƯ PUI
                            </h1>
                            <div className="mt-4 p-3 bg-black/30 border border-white/20 rounded-xl backdrop-blur-sm inline-block">
                                <p className="text-yellow-300 font-bold text-sm md:text-base flex items-center justify-center gap-2">
                                    <Phone size={16} className="animate-pulse"/> Thông tin liên hệ: Zalo 0967080202
                                </p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div className="flex bg-black/30 rounded-xl p-1 border border-white/10">
                                <button className={`flex-1 py-2 rounded-lg transition-all text-sm md:text-base ${!isPhoneLogin?'bg-white text-indigo-900 font-bold':'text-white'}`} onClick={()=>setIsPhoneLogin(false)}><User size={16} className="inline mr-1"/> Học sinh</button>
                                <button className={`flex-1 py-2 rounded-lg transition-all text-sm md:text-base ${isPhoneLogin?'bg-white text-indigo-900 font-bold':'text-white'}`} onClick={()=>setIsPhoneLogin(true)}><Smartphone size={16} className="inline mr-1"/> Phụ huynh</button>
                            </div>
                            <input type={isPhoneLogin?"tel":"text"} value={name} onChange={e=>setName(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder={isPhoneLogin?"Số điện thoại...":"Nhập tên của em..."}/>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-blue-200 text-sm">Khối</label><select value={grade} onChange={e=>setGrade(Number(e.target.value))} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold"><option className="text-black" value={6}>6</option><option className="text-black" value={7}>7</option><option className="text-black" value={8}>8</option><option className="text-black" value={9}>9</option></select></div>
                                <div><label className="text-blue-200 text-sm">Lớp</label><select value={className} onChange={e=>setClassName(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold">{classStructure[grade]?.map(c=><option className="text-black" key={c} value={c}>{c}</option>)}</select></div>
                            </div>
                            <button onClick={()=>{if(name) onLogin({name, grade, className}); else alert("Vui lòng nhập tên!")}} className="w-full py-3 md:py-4 mt-4 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-bold text-indigo-900 text-lg shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2"><Play size={24} fill="currentColor"/> BẮT ĐẦU ÔN LUYỆN</button>
                        </div>
                    </div>
                    <p className="mt-6 text-sm text-white/50 relative z-10">© 2025 Design by Thầy Lê Đình Cương GV Tin Học THCS Cư Pui</p>
                </div>
            );
        };

        // 5. Dashboard
        const Dashboard = ({ user, onSelectMode, onLogout, onOpenCourse }) => (
            <div className="min-h-screen bg-slate-50">
                <header className="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-10 flex justify-between items-center">
                    <div className="flex items-center gap-3"><div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-yellow-400 flex items-center justify-center text-indigo-900 font-bold">{user.grade}</div><div><h2 className="font-bold text-base md:text-lg">{user.name}</h2><p className="text-xs text-blue-200">{user.className}</p></div></div>
                    <button onClick={onLogout} className="text-sm bg-white/10 px-3 py-1 rounded hover:bg-white/20">Thoát</button>
                </header>
                <div className="max-w-4xl mx-auto p-4 md:p-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div className="p-6 bg-gradient-to-br from-slate-800 to-indigo-900 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Code className="text-cyan-400"/> LẬP TRÌNH PYTHON</h3>
                            <p className="text-slate-300 text-sm mb-4">Làm chủ ngôn ngữ lập trình.</p>
                            <button onClick={()=>onOpenCourse('python')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                        <div className="p-6 bg-gradient-to-br from-orange-600 to-red-700 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Gamepad2 className="text-yellow-300"/> LẬP TRÌNH SCRATCH</h3>
                            <p className="text-orange-100 text-sm mb-4">Học kỳ 2 năm học 2025-2026.</p>
                            <button onClick={()=>onOpenCourse('scratch')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                    </div>
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 flex items-center gap-2"><Star className="text-yellow-500" fill="currentColor"/> Chọn thử thách</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {[{id:'mcq',t:'Trắc Nghiệm',i:<CheckCircle size={28}/>,c:'from-blue-500 to-cyan-400'},{id:'tf',t:'Đúng / Sai',i:<HelpCircle size={28}/>,c:'from-green-500 to-emerald-400'},{id:'fill',t:'Điền Khuyết',i:<Edit3 size={28}/>,c:'from-purple-500 to-pink-400'},{id:'essay',t:'Tự Luận',i:<BookOpen size={28}/>,c:'from-orange-500 to-red-400'}].map(m=>(
                            <button key={m.id} onClick={()=>onSelectMode(m.id)} className={`relative p-5 md:p-6 rounded-2xl shadow-lg hover:-translate-y-1 transition-all bg-gradient-to-br ${m.c} text-white text-left overflow-hidden group`}>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform"></div>
                                <div className="relative z-10 flex justify-between items-center"><div><h4 className="text-xl md:text-2xl font-bold">{m.t}</h4></div><div className="p-3 bg-white/20 rounded-xl">{m.i}</div></div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        // 6. Game Screen (Logic game - Hiển thị đáp án khi sai)
        const GameScreen = ({ user, mode, onFinish, onBack, questionData }) => {
            const [qIdx, setQIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [inputVal, setInputVal] = useState("");
            const [showHint, setShowHint] = useState(false);
            const [aiRes, setAiRes] = useState(null);
            const [loadingAI, setLoadingAI] = useState(false);

            const questions = questionData[user.grade]?.[mode] || [];
            const q = questions[qIdx];

            useEffect(() => { setAiRes(null); setLoadingAI(false); setShowHint(false); setInputVal(""); setFeedback(null); }, [qIdx]);

            if(!q) return <div className="min-h-screen flex items-center justify-center flex-col"><p className="text-xl font-bold text-slate-500 mb-4">Chưa có câu hỏi.</p><button onClick={onBack} className="bg-indigo-600 text-white px-4 py-2 rounded">Quay lại</button></div>;

            const handleAns = (ans) => {
                if(feedback) return;
                const isCorrect = (mode==='mcq' || mode==='tf') ? ans === q.correct : inputVal.toLowerCase().trim() === q.answer?.toLowerCase().trim();
                setFeedback(isCorrect?'correct':'wrong');
                if(isCorrect) setScore(score+10);
                setTimeout(() => {
                    if(qIdx < questions.length-1) setQIdx(qIdx+1);
                    else onFinish({score: isCorrect?score+10:score, total: questions.length*10});
                }, isCorrect ? 1500 : 3000); // Đợi 3s nếu sai để học sinh xem đáp án
            };

            const askAI = async (type) => {
                setLoadingAI(true);
                const p = type==='hint' ? `Gợi ý ngắn gọn cho câu hỏi: "${q.question}"` : `Chấm điểm câu trả lời: "${inputVal}" cho câu hỏi "${q.question}". Gợi ý: "${q.hint}"`;
                const res = await callGeminiAPI(p);
                setAiRes(res);
                setLoadingAI(false);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center px-4 md:px-6">
                        <button onClick={onBack}><XCircle className="text-slate-400 hover:text-slate-600"/></button>
                        <div className="flex-1 mx-4 h-2 md:h-3 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-yellow-400 transition-all" style={{width:`${(qIdx/questions.length)*100}%`}}></div></div>
                        <span className="font-bold text-indigo-900 text-sm md:text-base">{qIdx+1}/{questions.length}</span>
                    </div>
                    <div className="flex-1 p-4 md:p-6 max-w-3xl mx-auto w-full flex flex-col justify-center">
                        <div className="w-full flex justify-end mb-2"><button onClick={()=>askAI('hint')} disabled={loadingAI} className="flex gap-2 items-center text-sm font-bold text-purple-600 bg-purple-100 px-3 py-2 rounded-full hover:bg-purple-200">{loadingAI?<Loader2 className="animate-spin" size={16}/>:<Sparkles size={16}/>} Gợi ý AI</button></div>
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full text-center mb-6 md:mb-8 relative overflow-hidden">
                            {feedback==='correct' && <div className="absolute inset-0 bg-green-500/90 flex items-center justify-center z-20 text-white text-2xl md:text-3xl font-bold animate-in fade-in"><CheckCircle size={60} className="mb-2 block mx-auto"/> CHÍNH XÁC!</div>}
                            {/* Hiển thị đáp án khi sai */}
                            {feedback==='wrong' && (
                                <div className="absolute inset-0 bg-red-500/90 flex flex-col items-center justify-center z-20 text-white animate-in fade-in p-4">
                                    <XCircle size={60} className="mb-2 block mx-auto"/>
                                    <h2 className="text-3xl font-bold">SAI RỒI!</h2>
                                    <div className="mt-4 bg-white/20 p-4 rounded-xl text-lg backdrop-blur-sm border border-white/30">
                                        Đáp án đúng: <strong>{mode === 'mcq' ? q.options[q.correct] : mode === 'tf' ? (q.correct ? "ĐÚNG" : "SAI") : q.answer}</strong>
                                    </div>
                                </div>
                            )}
                            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs md:text-sm font-bold uppercase mb-4 inline-block">{mode}</span>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800">{q.question}</h2>
                        </div>
                        {aiRes && <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 mb-6 text-slate-700 animate-in fade-in text-sm md:text-base"><strong className="text-purple-700 flex gap-2 items-center"><Sparkles size={16}/> AI:</strong> {aiRes}</div>}
                        
                        <div className="w-full">
                            {mode==='mcq' && <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{q.options.map((o,i)=><button key={i} onClick={()=>handleAns(i)} className="p-4 bg-white border-2 rounded-2xl font-semibold hover:border-indigo-500 hover:bg-indigo-50 text-left flex gap-2 text-sm md:text-base"><span className="text-indigo-600 font-bold">{String.fromCharCode(65+i)}.</span> {o}</button>)}</div>}
                            {mode==='tf' && <div className="grid grid-cols-2 gap-4 md:gap-6"><button onClick={()=>handleAns(true)} className="p-6 md:p-8 bg-green-50 border-2 border-green-200 rounded-2xl font-bold text-green-700 hover:bg-green-100 text-lg md:text-xl">ĐÚNG</button><button onClick={()=>handleAns(false)} className="p-6 md:p-8 bg-red-50 border-2 border-red-200 rounded-2xl font-bold text-red-700 hover:bg-red-100 text-lg md:text-xl">SAI</button></div>}
                            {(mode==='fill' || mode==='essay') && <div className="flex flex-col gap-4">
                                {mode==='fill' ? <input type="text" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-4 border-2 rounded-xl text-center text-lg md:text-xl outline-none focus:border-indigo-500" placeholder="Nhập đáp án..."/> : <textarea rows="4" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-4 border-2 rounded-xl text-base md:text-lg outline-none focus:border-orange-500" placeholder="Viết câu trả lời..."/>}
                                {showHint && <div className="bg-yellow-50 p-3 rounded text-yellow-800 text-sm">Gợi ý: {q.hint}</div>}
                                <div className="flex gap-2">
                                    {mode==='essay' && <button onClick={()=>setShowHint(true)} className="px-4 py-3 bg-white border font-bold rounded-xl text-slate-600 text-sm">Gợi ý</button>}
                                    {mode==='essay' && <button onClick={()=>askAI('grade')} className="flex-1 bg-purple-600 text-white font-bold rounded-xl flex justify-center items-center gap-2 text-sm">Chấm điểm AI</button>}
                                    <button onClick={mode==='fill' ? handleAns : () => { if(qIdx<questions.length-1) setQIdx(qIdx+1); else onFinish({score, total:0}); }} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg text-sm">{mode==='fill'?'Kiểm tra':'Tiếp theo'}</button>
                                </div>
                            </div>}
                        </div>
                    </div>
                </div>
            );
        };

        // 7. Result Screen
        const ResultScreen = ({ score, total, onRetry, onHome }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <div className="w-24 h-24 md:w-32 md:h-32 rounded-full bg-yellow-100 flex items-center justify-center mb-6 shadow-xl animate-bounce"><Trophy size={48} className="text-yellow-600 md:w-16 md:h-16"/></div>
                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">Hoàn Thành!</h2>
                <p className="text-lg md:text-xl text-slate-600 mb-8">Điểm số: <span className="text-4xl font-bold text-indigo-600">{score}</span> / {total}</p>
                <div className="flex flex-col w-full max-w-xs gap-3">
                    <button onClick={onRetry} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold flex justify-center items-center gap-2"><RefreshCcw size={20}/> Làm lại</button>
                    <button onClick={onHome} className="w-full py-3 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50">Về Menu</button>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [screen, setScreen] = useState('welcome');
            const [currentMode, setCurrentMode] = useState(null);
            const [lastResult, setLastResult] = useState({ score: 0, total: 0 });
            const [questionData, setQuestionData] = useState(DEFAULT_QUESTION_BANK);
            const [studentList, setStudentList] = useState([]);
            const [showCourseModal, setShowCourseModal] = useState(false);
            const [adminPassword, setAdminPassword] = useState(() => localStorage.getItem('admin_pwd') || 'admin');
            const [classStructure, setClassStructure] = useState(() => JSON.parse(localStorage.getItem('class_structure')) || DEFAULT_CLASS_STRUCTURE);

            useEffect(() => {
                const saved = localStorage.getItem('tinhoc_students');
                if (saved) setStudentList(JSON.parse(saved));
            }, []);

            const saveStudent = (studentData) => {
                const now = new Date();
                const newItem = { ...studentData, loginTime: now.toLocaleString('vi-VN'), dateKey: now.toLocaleDateString('vi-VN'), lastScore: undefined, pythonReg: null, scratchReg: null };
                const newList = [newItem, ...studentList];
                setStudentList(newList);
                localStorage.setItem('tinhoc_students', JSON.stringify(newList));
            };

            const updateStudentScore = (score) => {
                if (!user) return;
                const updatedList = studentList.map(s => {
                    if (s.name === user.name && s.loginTime === user.loginTime) return { ...s, lastScore: score };
                    return s;
                });
                setStudentList(updatedList);
                localStorage.setItem('tinhoc_students', JSON.stringify(updatedList));
            };

            const registerCourse = ({ studentName, phone, email, regGrade, courseType }) => {
                if (!user) return;
                const updatedList = studentList.map(s => {
                    if (s.name === user.name && s.loginTime === user.loginTime) {
                        const regInfo = { studentName, phone, email, regGrade };
                        if (courseType === 'python') return { ...s, pythonReg: regInfo };
                        if (courseType === 'scratch') return { ...s, scratchReg: regInfo };
                    }
                    return s;
                });
                setStudentList(updatedList);
                localStorage.setItem('tinhoc_students', JSON.stringify(updatedList));
                setShowCourseModal(false);
            };

            const handleChangeAdminPassword = (newPwd) => { setAdminPassword(newPwd); localStorage.setItem('admin_pwd', newPwd); alert("Đổi mật khẩu thành công!"); };
            
            const handleDeleteHistory = () => { if(confirm("Xóa toàn bộ lịch sử?")) { setStudentList([]); localStorage.removeItem('tinhoc_students'); } };

            const handleUpdateClassStructure = (grade, className) => {
                const updatedStructure = { ...classStructure };
                if (!updatedStructure[grade]) updatedStructure[grade] = [];
                if (!updatedStructure[grade].includes(className)) {
                    updatedStructure[grade].push(className);
                    updatedStructure[grade].sort(); // Sắp xếp tên lớp
                    setClassStructure(updatedStructure);
                    localStorage.setItem('class_structure', JSON.stringify(updatedStructure));
                    alert(`Đã thêm lớp ${className} vào khối ${grade}`);
                } else {
                    alert("Lớp này đã tồn tại!");
                }
            };

            const handleLogin = (u) => { 
                const now = new Date();
                const userData = { ...u, loginTime: now.toLocaleString('vi-VN'), dateKey: now.toLocaleDateString('vi-VN') };
                setUser(userData); saveStudent(userData); setScreen('dashboard'); 
            };

            return (
                <div className="font-sans antialiased text-slate-800">
                    {screen === 'welcome' && <WelcomeScreen onLogin={handleLogin} onAdminLogin={()=>setScreen('admin')} adminPassword={adminPassword} classStructure={classStructure} />}
                    
                    {screen === 'admin' && (
                        <AdminScreen 
                            onBack={()=>setScreen('welcome')} 
                            studentList={studentList} 
                            onDeleteHistory={handleDeleteHistory} 
                            onUploadData={setQuestionData} 
                            onChangePassword={handleChangeAdminPassword}
                            onUpdateClassStructure={handleUpdateClassStructure}
                            classStructure={classStructure}
                        />
                    )}
                    
                    {screen === 'dashboard' && user && <Dashboard user={user} onSelectMode={(m)=>{setCurrentMode(m); setScreen('game')}} onLogout={()=>{setUser(null); setScreen('welcome')}} onOpenCourse={setShowCourseModal}/>}
                    {screen === 'game' && user && <GameScreen user={user} mode={currentMode} onFinish={(r)=>{setLastResult(r); updateStudentScore(r.score); setScreen('result')}} onBack={()=>setScreen('dashboard')} questionData={questionData}/>}
                    {screen === 'result' && <ResultScreen score={lastResult.score} total={lastResult.total} onRetry={()=>setScreen('game')} onHome={()=>setScreen('dashboard')} />}
                    {showCourseModal && <CourseRegistrationModal courseType={showCourseModal} onClose={()=>setShowCourseModal(false)} onRegister={registerCourse} defaultGrade={user?.grade} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
