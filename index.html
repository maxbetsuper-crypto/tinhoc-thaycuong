<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đam Mê Tin Học - Online Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"
      }

    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* Không dùng glass-panel trắng nữa mà dùng style trực tiếp trong component */
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-yellow-400 selection:text-indigo-900">

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            BookOpen, CheckCircle, XCircle, Trophy, User, Smartphone, Play, 
            RefreshCcw, Star, Edit3, HelpCircle, Brain, Upload, Download, 
            Sparkles, Loader2, Users, Lock, List, Trash2, LogOut, Calendar, 
            Database, Terminal, Code, Monitor, Phone, Key, Gamepad2, Plus, 
            X, AlertCircle, Info, Cloud, Settings
        } from 'lucide-react';
        
        // --- FIREBASE IMPORTS ---
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import { 
            getFirestore, collection, addDoc, onSnapshot, 
            updateDoc, doc, setDoc, deleteDoc, query, orderBy, serverTimestamp, getDocs
        } from 'firebase/firestore';
        import { getAuth, signInAnonymously } from 'firebase/auth';

        // --- CẤU HÌNH FIREBASE CHÍNH THỨC CỦA BẠN ---
        const firebaseConfig = {
          apiKey: "AIzaSyBJuLbMtx4GLsRcj_PO3TU0E4VBhOyJ-yQ",
          authDomain: "dam-me-tin-hoc.firebaseapp.com",
          databaseURL: "https://dam-me-tin-hoc-default-rtdb.firebaseio.com",
          projectId: "dam-me-tin-hoc",
          storageBucket: "dam-me-tin-hoc.firebasestorage.app",
          messagingSenderId: "656467913362",
          appId: "1:656467913362:web:2593c5b816b08f0f9ed44b"
        };

        // Biến toàn cục để lưu instance
        let db = null;
        let auth = null;

        // --- CẤU HÌNH UI ---
        const BACKGROUND_IMAGE = "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=2070&auto=format&fit=crop"; 
        const DEFAULT_CLASS_STRUCTURE = {
            6: ["6A1", "6A2", "6A3"], 7: ["7A1", "7A2", "7A3"],
            8: ["8A1", "8A2", "8A3"], 9: ["9A4", "9A5", "9A6"]
        };

        // Dữ liệu câu hỏi mặc định
        const DEFAULT_QUESTION_BANK = {
            6: { mcq: [{ id: 1, question: "Thông tin là gì?", options: ["Là những gì đem lại hiểu biết", "Là các con số", "Là văn bản", "Là hình ảnh"], correct: 0 }], tf: [{ id: 1, question: "Máy tính cần hệ điều hành để hoạt động.", correct: true }], fill: [{ id: 1, question: "Mạng máy tính gồm các thiết bị và ... kết nối.", answer: "đường truyền" }], essay: [{ id: 1, question: "Tác hại của nghiện game?", hint: "Ảnh hưởng sức khỏe..." }] },
            7: { mcq: [{ id: 1, question: "Mạng xã hội thường được tổ chức dưới dạng nào?", options: ["Website", "Sách giấy", "Đĩa CD", "Tờ rơi"], correct: 0 }], tf: [{ id: 1, question: "Cần giao tiếp lịch sự trên mạng.", correct: true }], fill: [{ id: 1, question: "Tự ý đăng nhập tài khoản người khác là truy cập ...", answer: "không hợp lệ" }], essay: [{ id: 1, question: "Lời khuyên khi gặp tin xấu?", hint: "Không chia sẻ, báo cáo..." }] },
            8: { mcq: [{ id: 1, question: "Tin học ứng dụng trong lĩnh vực nào?", options: ["Y tế", "Giáo dục", "Quốc phòng", "Cả A, B, C"], correct: 3 }], tf: [{ id: 1, question: "Scratch hỗ trợ lập trình kéo thả.", correct: true }], fill: [{ id: 1, question: "Lệnh thực hiện lần lượt là cấu trúc ...", answer: "tuần tự" }], essay: [{ id: 1, question: "Biến là gì?", hint: "Đại lượng lưu trữ giá trị thay đổi." }] },
            9: { mcq: [{ id: 1, question: "Tác động tiêu cực của công nghệ số?", options: ["Thất nghiệp", "Hại mắt", "Tiết kiệm thời gian", "Rác thải điện tử"], correct: 3 }], tf: [{ id: 1, question: "Hình ảnh giúp sơ đồ tư duy sinh động.", correct: true }], fill: [{ id: 1, question: "Năng lượng chuyển từ cơ năng sang ...", answer: "điện năng" }], essay: [{ id: 1, question: "Chủ đề sơ đồ tư duy yêu thích?", hint: "Tùy chọn..." }] }
        };

        // --- GEMINI API HELPER ---
        const callGeminiAPI = async (prompt) => {
            const apiKey = ""; // API Key Gemini (Optional)
            if (!apiKey) return "Chưa có API Key Gemini.";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI đang bận.";
            } catch (error) { return "Lỗi kết nối AI."; }
        };

        // --- COMPONENTS ---
        const NotificationToast = ({ notification, onClose }) => {
            if (!notification) return null;
            const bgColors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
            const Icon = { success: CheckCircle, error: AlertCircle, info: Info, warning: HelpCircle }[notification.type] || Info;
            return (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-slide-up">
                    <div className={`${bgColors[notification.type] || 'bg-slate-800'} text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 min-w-[300px] justify-between`}>
                        <div className="flex items-center gap-2"><Icon size={20} /><span className="font-semibold text-sm">{notification.msg}</span></div>
                        <button onClick={onClose} className="hover:bg-white/20 rounded-full p-1"><X size={16}/></button>
                    </div>
                </div>
            );
        };

        const ChangePasswordModal = ({ onClose, onChangePassword, notify }) => {
            const [newPwd, setNewPwd] = useState("");
            const [confirmPwd, setConfirmPwd] = useState("");
            const [error, setError] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (newPwd.length < 4) return setError("Mật khẩu phải có ít nhất 4 ký tự.");
                if (newPwd !== confirmPwd) return setError("Mật khẩu xác nhận không khớp.");
                onChangePassword(newPwd);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-in">
                    <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm animate-slide-up">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <Key size={20} className="text-indigo-600" /> Đổi Mật Khẩu Admin
                        </h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-600 mb-1">Mật khẩu mới</label>
                                <input 
                                    type="password" 
                                    value={newPwd}
                                    onChange={(e) => setNewPwd(e.target.value)}
                                    className="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                    autoFocus
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-600 mb-1">Xác nhận mật khẩu</label>
                                <input 
                                    type="password" 
                                    value={confirmPwd}
                                    onChange={(e) => setConfirmPwd(e.target.value)}
                                    className="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                            </div>
                            {error && <p className="text-red-500 text-sm">{error}</p>}
                            <div className="flex gap-2 pt-2">
                                <button type="button" onClick={onClose} className="flex-1 py-2 bg-slate-100 text-slate-600 font-bold rounded-lg hover:bg-slate-200">Hủy</button>
                                <button type="submit" className="flex-1 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const CourseRegistrationModal = ({ onClose, onRegister, defaultGrade, courseType, notify }) => {
            const [studentName, setStudentName] = useState("");
            const [phone, setPhone] = useState("");
            const [email, setEmail] = useState("");
            const [regGrade, setRegGrade] = useState(defaultGrade || 8);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const isScratch = courseType === 'scratch';

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!studentName.trim() || !phone.trim()) return notify("Nhập thiếu thông tin!", "error");
                setIsSubmitting(true);
                await onRegister({ studentName, phone, email, regGrade, courseType });
                setIsSubmitting(false);
            };

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-in overflow-y-auto">
                    <div className="bg-slate-900 text-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700 animate-slide-up relative">
                        <div className={`bg-gradient-to-r ${isScratch ? "from-orange-500 to-red-500" : "from-blue-600 to-cyan-600"} p-4 relative`}>
                            <button onClick={onClose} className="absolute top-3 right-3 text-white/80 hover:bg-white/20 rounded-full p-1"><XCircle size={24}/></button>
                            <h2 className="text-xl font-bold">{isScratch ? "Lập trình Scratch" : "Lập trình Python"}</h2>
                            <p className="text-white/80 text-sm">Điền thông tin để thầy liên hệ nhé!</p>
                        </div>
                        <div className="p-6">
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div><label className="block text-sm text-slate-400 mb-1">Họ tên</label><input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:ring-2 focus:ring-cyan-500 outline-none" placeholder="Nguyễn Văn A" required/></div>
                                <div><label className="block text-sm text-slate-400 mb-1">Lớp đăng ký</label><div className="flex gap-2">{[6,7,8,9].map(g=><button key={g} type="button" onClick={()=>setRegGrade(g)} className={`flex-1 py-2 rounded-lg border ${regGrade===g?'bg-yellow-400 text-slate-900 border-yellow-400':'border-slate-600 text-slate-400'}`}>Lớp {g}</button>)}</div></div>
                                <div><label className="block text-sm text-slate-400 mb-1">SĐT Zalo</label><input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:ring-2 focus:ring-cyan-500 outline-none" placeholder="09xxxxxxx" required/></div>
                                <button type="submit" disabled={isSubmitting} className={`w-full py-3 bg-white text-slate-900 font-bold rounded-xl hover:bg-slate-200 flex justify-center items-center gap-2 ${isSubmitting?'opacity-70':''}`}>{isSubmitting ? <Loader2 className="animate-spin"/> : <Edit3 size={18}/>} {isSubmitting ? "Đang gửi..." : "Gửi Đăng Ký"}</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminScreen = ({ onBack, studentList, onDeleteHistory, onUploadData, onChangePassword, onUpdateClassStructure, classStructure, notify }) => {
            const [activeTab, setActiveTab] = useState('history');
            const [filterGrade, setFilterGrade] = useState('ALL');
            const [newClassInput, setNewClassInput] = useState({ grade: 6, name: "" });
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const fileInputRef = useRef(null);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = window.XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
                        const json = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
                        notify("Đã đọc file! (Lưu ý: Tính năng lưu câu hỏi lên Cloud đang phát triển)", "success");
                    } catch (err) { notify("Lỗi file!", "error"); }
                };
                reader.readAsArrayBuffer(file);
            };

            const handleDelete = async () => {
                setIsDeleting(true);
                await onDeleteHistory();
                setIsDeleting(false);
            };

            const filteredList = studentList.filter(s => filterGrade === 'ALL' || s.grade?.toString() === filterGrade);

            return (
                <div className="min-h-screen bg-slate-100 p-2 md:p-6 animate-in">
                    <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
                        <div className="bg-indigo-900 p-4 text-white flex justify-between items-center">
                            <div className="flex items-center gap-3"><Lock size={24} className="text-yellow-400"/><h2 className="text-xl font-bold">Quản Trị Hệ Thống</h2></div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowPwdModal(true)} className="bg-white/10 px-3 py-2 rounded hover:bg-white/20 text-sm flex gap-2 items-center transition-colors"><Key size={16}/> Đổi MK</button>
                                <button onClick={onBack} className="bg-white/10 px-3 py-2 rounded hover:bg-white/20 text-sm flex gap-2 items-center transition-colors"><LogOut size={16}/> Thoát</button>
                            </div>
                        </div>
                        {showPwdModal && <ChangePasswordModal onClose={() => setShowPwdModal(false)} onChangePassword={onChangePassword} notify={notify} />}
                        
                        <div className="p-4 md:p-6">
                            <div className="grid md:grid-cols-2 gap-4 mb-6">
                                <div className="p-4 bg-green-50 border border-green-200 rounded-xl">
                                    <h3 className="font-bold text-green-900 mb-2">Cấu trúc Lớp học (Cloud)</h3>
                                    <div className="flex gap-2">
                                        <select value={newClassInput.grade} onChange={e=>setNewClassInput({...newClassInput, grade: Number(e.target.value)})} className="border rounded px-2 py-1 text-sm"><option value={6}>K6</option><option value={7}>K7</option><option value={8}>K8</option><option value={9}>K9</option></select>
                                        <input type="text" placeholder="Tên lớp (VD: 8A1)" value={newClassInput.name} onChange={e=>setNewClassInput({...newClassInput, name: e.target.value})} className="flex-1 border rounded px-2 py-1 text-sm"/>
                                        <button onClick={()=>{onUpdateClassStructure(newClassInput.grade, newClassInput.name); setNewClassInput({...newClassInput, name: ""})}} className="bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">Thêm</button>
                                    </div>
                                    <div className="mt-2 text-xs text-slate-500">Các lớp hiện có: {Object.values(classStructure).flat().length} lớp</div>
                                </div>
                                <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl flex flex-col justify-center items-center">
                                    <h3 className="font-bold text-blue-900 mb-2 flex gap-2"><Cloud size={18}/> Dữ liệu Realtime</h3>
                                    <p className="text-sm text-blue-700 text-center">Dữ liệu đang được đồng bộ hóa trực tiếp với Firebase.</p>
                                </div>
                            </div>

                            <div className="flex gap-2 mb-4 border-b pb-2">
                                <button onClick={()=>setActiveTab('history')} className={`px-3 py-2 font-bold text-sm rounded ${activeTab==='history'?'bg-indigo-100 text-indigo-700':'text-slate-500'}`}>Lịch sử làm bài</button>
                                <button onClick={()=>setActiveTab('reg')} className={`px-3 py-2 font-bold text-sm rounded ${activeTab==='reg'?'bg-yellow-100 text-yellow-700':'text-slate-500'}`}>Đăng ký khóa học</button>
                            </div>

                            {activeTab === 'history' && (
                                <div>
                                    <div className="flex flex-wrap gap-2 mb-4 items-center">
                                        <select onChange={e=>setFilterGrade(e.target.value)} className="border p-2 rounded text-sm"><option value="ALL">Tất cả Khối</option><option value="6">K6</option><option value="7">K7</option><option value="8">K8</option><option value="9">K9</option></select>
                                        <button onClick={handleDelete} disabled={isDeleting} className={`ml-auto text-red-600 border border-red-200 bg-red-50 px-3 py-2 rounded hover:bg-red-100 text-sm flex items-center gap-1 font-bold ${isDeleting ? 'opacity-50' : ''}`}>
                                            {isDeleting ? <Loader2 size={16} className="animate-spin"/> : <Trash2 size={16}/>} Xóa TOÀN BỘ lịch sử
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto border rounded-xl shadow-sm max-h-[500px] overflow-y-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b sticky top-0"><tr><th className="p-3">Học sinh</th><th className="p-3">Lớp</th><th className="p-3">Thời gian</th><th className="p-3 text-right">Điểm</th></tr></thead>
                                            <tbody>
                                                {filteredList.map((s) => (
                                                    <tr key={s.id} className="border-b hover:bg-slate-50 text-sm">
                                                        <td className="p-3 font-bold text-indigo-900">{s.name}</td>
                                                        <td className="p-3"><span className="bg-blue-100 px-2 py-1 rounded text-xs text-blue-800 font-bold">{s.className}</span></td>
                                                        <td className="p-3 text-slate-500">{s.loginTime}</td>
                                                        <td className="p-3 text-right font-bold text-green-600">{s.lastScore!==undefined ? s.lastScore : '-'}</td>
                                                    </tr>
                                                ))}
                                                {filteredList.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">Chưa có dữ liệu</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                             {activeTab === 'reg' && (
                                <div className="overflow-x-auto border rounded-xl shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-orange-50 border-b"><tr><th className="p-3">Học sinh</th><th className="p-3">Lớp</th><th className="p-3">Khóa</th><th className="p-3">SĐT</th></tr></thead>
                                        <tbody>
                                            {studentList.filter(s=>s.pythonReg || s.scratchReg).map((s) => {
                                                const reg = s.pythonReg || s.scratchReg;
                                                const type = s.pythonReg ? 'Python' : 'Scratch';
                                                return (
                                                    <tr key={s.id} className="border-b text-sm">
                                                        <td className="p-3 font-bold">{reg.studentName}</td>
                                                        <td className="p-3">{s.className}</td>
                                                        <td className="p-3"><span className="border px-2 py-1 rounded font-bold text-xs">{type} - Lớp {reg.regGrade}</span></td>
                                                        <td className="p-3 font-mono text-indigo-600">{reg.phone}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- RESTORED WELCOME SCREEN ---
        const WelcomeScreen = ({ onLogin, onAdminLogin, adminPassword, classStructure, notify }) => {
            const [name, setName] = useState("");
            const [grade, setGrade] = useState(8);
            const [className, setClassName] = useState("");
            const [isPhoneLogin, setIsPhoneLogin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPwdInput, setAdminPwdInput] = useState("");
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (classStructure[grade] && classStructure[grade].length > 0) setClassName(classStructure[grade][0]);
                else setClassName("");
            }, [grade, classStructure]);

            const handleLogin = async () => {
                if (!name.trim()) return notify("Vui lòng nhập tên!", "error");
                if (!db) return notify("Đang kết nối Firebase, vui lòng đợi...", "warning");
                setLoading(true);
                await onLogin({name, grade, className});
                setLoading(false);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 text-white relative bg-cover bg-center overflow-hidden" style={{backgroundImage: `url('${BACKGROUND_IMAGE}')`, backgroundColor: '#1e293b'}}>
                    <div className="absolute inset-0 bg-slate-900/60 z-0"></div>
                    <button onClick={() => setShowAdminModal(true)} className="absolute top-4 right-4 bg-white/10 p-2 rounded-full hover:bg-white/20 z-20"><Lock size={20}/></button>

                    {showAdminModal && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <div className="bg-white text-slate-900 p-6 rounded-xl w-full max-w-sm">
                                <h3 className="font-bold mb-4">Đăng nhập Quản trị</h3>
                                <input type="password" value={adminPwdInput} onChange={e=>setAdminPwdInput(e.target.value)} className="w-full border p-2 rounded mb-4 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Mật khẩu"/>
                                <div className="flex gap-2"><button onClick={()=>setShowAdminModal(false)} className="flex-1 bg-slate-200 py-2 rounded font-bold">Hủy</button><button onClick={()=>{if(adminPwdInput===adminPassword) onAdminLogin(); else notify("Sai mật khẩu!","error")}} className="flex-1 bg-indigo-600 text-white py-2 rounded font-bold">Vào</button></div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white/10 backdrop-blur-md p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/20 relative z-10 animate-slide-up">
                        <div className="text-center mb-6 md:mb-8">
                            <div className="bg-gradient-to-tr from-yellow-400 to-orange-500 w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg animate-bounce"><Monitor size={40} className="text-white md:w-12 md:h-12"/></div>
                            <h1 className="text-xl md:text-2xl font-bold mb-2 text-white uppercase leading-snug drop-shadow-lg">
                                ĐAM MÊ TIN HỌC VỚI THẦY LÊ ĐÌNH CƯƠNG<br/>
                                TRƯỜNG THCS CƯ PUI
                            </h1>
                            <div className="mt-4 p-3 bg-black/30 border border-white/20 rounded-xl backdrop-blur-sm inline-block">
                                <p className="text-yellow-300 font-bold text-sm md:text-base flex items-center justify-center gap-2">
                                    <Phone size={16} className="animate-pulse"/> Thông tin liên hệ: Zalo 0967080202
                                </p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div className="flex bg-black/30 rounded-xl p-1 border border-white/10">
                                <button className={`flex-1 py-2 rounded-lg transition-all text-sm md:text-base ${!isPhoneLogin?'bg-white text-indigo-900 font-bold':'text-white'}`} onClick={()=>setIsPhoneLogin(false)}><User size={16} className="inline mr-1"/> Học sinh</button>
                                <button className={`flex-1 py-2 rounded-lg transition-all text-sm md:text-base ${isPhoneLogin?'bg-white text-indigo-900 font-bold':'text-white'}`} onClick={()=>setIsPhoneLogin(true)}><Smartphone size={16} className="inline mr-1"/> Phụ huynh</button>
                            </div>
                            <input type={isPhoneLogin?"tel":"text"} value={name} onChange={e=>setName(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder={isPhoneLogin?"Số điện thoại...":"Nhập tên của em..."}/>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-blue-200 text-sm">Khối</label><select value={grade} onChange={e=>setGrade(Number(e.target.value))} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold"><option className="text-black" value={6}>6</option><option className="text-black" value={7}>7</option><option className="text-black" value={8}>8</option><option className="text-black" value={9}>9</option></select></div>
                                <div><label className="text-blue-200 text-sm">Lớp</label><select value={className} onChange={e=>setClassName(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/20 text-white font-bold">{classStructure[grade]?.map(c=><option className="text-black" key={c} value={c}>{c}</option>)}</select></div>
                            </div>
                            <button onClick={handleLogin} disabled={loading} className="w-full py-3 md:py-4 mt-4 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-xl font-bold text-indigo-900 text-lg shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2">{loading ? <Loader2 className="animate-spin"/> : <Play size={24} fill="currentColor"/>} BẮT ĐẦU ÔN LUYỆN</button>
                        </div>
                    </div>
                    <p className="mt-6 text-sm text-white/50 relative z-10">© 2025 Design by Thầy Lê Đình Cương GV Tin Học THCS Cư Pui</p>
                </div>
            );
        };

        const Dashboard = ({ user, onSelectMode, onLogout, onOpenCourse }) => (
            <div className="min-h-screen bg-slate-50 animate-in">
                <header className="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-40 flex justify-between items-center backdrop-blur-md bg-indigo-900/95">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center text-indigo-900 font-bold shadow-inner">{user.grade}</div>
                        <div><h2 className="font-bold text-base md:text-lg">{user.name}</h2><p className="text-xs text-indigo-200 font-medium">{user.className}</p></div>
                    </div>
                    <button onClick={onLogout} className="text-sm bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 font-semibold transition-colors">Thoát</button>
                </header>
                <div className="max-w-4xl mx-auto p-4 md:p-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div className="p-6 bg-gradient-to-br from-slate-800 to-indigo-900 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-cyan-500/20 rounded-full blur-3xl -mr-10 -mt-10 group-hover:bg-cyan-500/30 transition-all"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Code className="text-cyan-400"/> LẬP TRÌNH PYTHON</h3>
                            <button onClick={()=>onOpenCourse('python')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold mt-4 hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                        <div className="p-6 bg-gradient-to-br from-orange-600 to-red-700 rounded-2xl md:rounded-3xl shadow-xl text-white relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-yellow-500/20 rounded-full blur-3xl -mr-10 -mt-10 group-hover:bg-yellow-500/30 transition-all"></div>
                            <h3 className="text-lg md:text-xl font-bold mb-1 flex gap-2 items-center"><Gamepad2 className="text-yellow-300"/> LẬP TRÌNH SCRATCH</h3>
                            <button onClick={()=>onOpenCourse('scratch')} className="w-full bg-white/10 border border-white/20 py-2 rounded-xl text-sm font-bold mt-4 hover:bg-white/20 transition-all">Đăng ký ngay</button>
                        </div>
                    </div>
                    <h3 className="text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 flex items-center gap-2"><Star className="text-yellow-500" fill="currentColor"/> Chọn thử thách</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {[{id:'mcq',t:'Trắc Nghiệm',i:<CheckCircle size={28}/>,c:'from-blue-500 to-cyan-400'},{id:'tf',t:'Đúng / Sai',i:<HelpCircle size={28}/>,c:'from-green-500 to-emerald-400'},{id:'fill',t:'Điền Khuyết',i:<Edit3 size={28}/>,c:'from-purple-500 to-pink-400'},{id:'essay',t:'Tự Luận',i:<BookOpen size={28}/>,c:'from-orange-500 to-red-400'}].map(m=>(
                            <button key={m.id} onClick={()=>onSelectMode(m.id)} className={`relative p-5 md:p-6 rounded-2xl shadow-lg hover:-translate-y-1 transition-all bg-gradient-to-br ${m.c} text-white text-left overflow-hidden group`}>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform"></div>
                                <div className="relative z-10 flex justify-between items-center"><div><h4 className="text-xl md:text-2xl font-bold">{m.t}</h4></div><div className="p-3 bg-white/20 rounded-xl">{m.i}</div></div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        const GameScreen = ({ user, mode, onFinish, onBack, questionData }) => {
            const [qIdx, setQIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [inputVal, setInputVal] = useState("");
            const [showHint, setShowHint] = useState(false);
            const [aiRes, setAiRes] = useState(null);
            const [loadingAI, setLoadingAI] = useState(false);
            const questions = questionData[user.grade]?.[mode] || [];
            const q = questions[qIdx];
            useEffect(() => { setAiRes(null); setLoadingAI(false); setShowHint(false); setInputVal(""); setFeedback(null); }, [qIdx]);

            if(!q) return <div className="min-h-screen flex items-center justify-center flex-col bg-slate-50"><p className="text-xl font-bold text-slate-500 mb-4">Chưa có câu hỏi.</p><button onClick={onBack} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Quay lại</button></div>;

            const handleAns = (ans) => {
                if(feedback) return;
                const isCorrect = (mode==='mcq' || mode==='tf') ? ans === q.correct : inputVal.toLowerCase().trim() === q.answer?.toLowerCase().trim();
                setFeedback(isCorrect?'correct':'wrong');
                if(isCorrect) setScore(score+10);
                setTimeout(() => {
                    if(qIdx < questions.length-1) setQIdx(qIdx+1);
                    else onFinish({score: isCorrect?score+10:score, total: questions.length*10});
                }, isCorrect ? 1500 : 3000); 
            };
            const askAI = async (type) => {
                setLoadingAI(true);
                const p = type==='hint' ? `Gợi ý ngắn gọn cho câu hỏi: "${q.question}"` : `Chấm điểm câu trả lời: "${inputVal}" cho câu hỏi "${q.question}". Gợi ý: "${q.hint}"`;
                const res = await callGeminiAPI(p);
                setAiRes(res);
                setLoadingAI(false);
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col animate-in">
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center px-4 md:px-6 sticky top-0 z-30">
                        <button onClick={onBack}><XCircle className="text-slate-400 hover:text-slate-600" size={28}/></button>
                        <div className="flex-1 mx-4 h-3 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-yellow-400 transition-all duration-500" style={{width:`${((qIdx+1)/questions.length)*100}%`}}></div></div>
                        <span className="font-bold text-indigo-900 text-sm">{qIdx+1}/{questions.length}</span>
                    </div>
                    <div className="flex-1 p-4 max-w-3xl mx-auto w-full flex flex-col justify-center">
                        <div className="w-full flex justify-end mb-2"><button onClick={()=>askAI('hint')} disabled={loadingAI} className="flex gap-2 items-center text-sm font-bold text-purple-600 bg-purple-100 px-4 py-2 rounded-full hover:bg-purple-200">{loadingAI?<Loader2 className="animate-spin" size={16}/>:<Sparkles size={16}/>} AI Gợi ý</button></div>
                        <div className="bg-white p-6 rounded-3xl shadow-xl w-full text-center mb-6 relative overflow-hidden">
                            {feedback==='correct' && <div className="absolute inset-0 bg-green-500/95 flex items-center justify-center z-20 text-white text-3xl font-bold animate-in"><CheckCircle size={60} className="mb-2 block mx-auto"/> ĐÚNG!</div>}
                            {feedback==='wrong' && <div className="absolute inset-0 bg-red-500/95 flex flex-col items-center justify-center z-20 text-white animate-in p-6"><XCircle size={60} className="mb-2 block mx-auto"/><h2 className="text-3xl font-bold mb-4">SAI RỒI!</h2><div className="bg-white/20 p-4 rounded-xl text-lg">Đáp án: {mode === 'mcq' ? q.options[q.correct] : mode === 'tf' ? (q.correct ? "ĐÚNG" : "SAI") : q.answer}</div></div>}
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-relaxed mb-4">{q.question}</h2>
                            {aiRes && <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 text-sm text-left mb-4"><strong className="text-purple-700">AI:</strong> {aiRes}</div>}
                            <div className="w-full">
                                {mode==='mcq' && <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{q.options.map((o,i)=><button key={i} onClick={()=>handleAns(i)} className="p-4 bg-white border-2 rounded-xl font-semibold hover:border-indigo-500 hover:bg-indigo-50 text-left flex gap-3 text-sm md:text-base"><span className="text-indigo-600 font-bold bg-indigo-50 w-6 h-6 rounded-full flex items-center justify-center">{String.fromCharCode(65+i)}</span> {o}</button>)}</div>}
                                {mode==='tf' && <div className="grid grid-cols-2 gap-4"><button onClick={()=>handleAns(true)} className="p-8 bg-green-50 border-2 border-green-200 rounded-2xl font-bold text-green-700 hover:bg-green-100 text-xl">ĐÚNG</button><button onClick={()=>handleAns(false)} className="p-8 bg-red-50 border-2 border-red-200 rounded-2xl font-bold text-red-700 hover:bg-red-100 text-xl">SAI</button></div>}
                                {(mode==='fill' || mode==='essay') && <div className="flex flex-col gap-4">
                                    {mode==='fill' ? <input type="text" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-4 border-2 rounded-xl text-center text-lg font-bold text-indigo-900 outline-none focus:border-indigo-500" placeholder="Đáp án..."/> : <textarea rows="4" value={inputVal} onChange={e=>setInputVal(e.target.value)} className="p-4 border-2 rounded-xl text-base outline-none focus:border-orange-500" placeholder="Trả lời..."/>}
                                    {showHint && <div className="bg-yellow-50 p-3 rounded text-yellow-800 text-sm border border-yellow-200">Gợi ý: {q.hint}</div>}
                                    <div className="flex gap-3">
                                        {mode==='essay' && <button onClick={()=>setShowHint(true)} className="px-4 py-3 bg-slate-100 font-bold rounded-xl text-slate-600 text-sm">Gợi ý</button>}
                                        {mode==='essay' && <button onClick={()=>askAI('grade')} className="flex-1 bg-purple-600 text-white font-bold rounded-xl flex justify-center items-center gap-2 text-sm">Chấm điểm AI</button>}
                                        <button onClick={mode==='fill' ? handleAns : () => { if(qIdx<questions.length-1) setQIdx(qIdx+1); else onFinish({score, total:0}); }} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 shadow-lg">{mode==='fill'?'Kiểm tra':'Tiếp theo'}</button>
                                    </div>
                                </div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultScreen = ({ score, total, onRetry, onHome }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center animate-in">
                <div className="w-32 h-32 rounded-full bg-yellow-100 flex items-center justify-center mb-6 shadow-2xl animate-bounce border-4 border-white"><Trophy size={64} className="text-yellow-600"/></div>
                <h2 className="text-3xl font-extrabold text-slate-800 mb-2">Hoàn Thành!</h2>
                <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 mb-8 w-full max-w-xs">
                    <p className="text-slate-500 mb-2 text-sm uppercase font-bold">Tổng điểm</p>
                    <p className="text-5xl font-black text-indigo-600">{score} <span className="text-2xl text-slate-400 font-normal">/ {total}</span></p>
                </div>
                <div className="flex flex-col w-full max-w-xs gap-3">
                    <button onClick={onRetry} className="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-indigo-700 shadow-lg"><RefreshCcw size={20}/> Làm lại</button>
                    <button onClick={onHome} className="w-full py-3.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50">Về Trang Chủ</button>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [screen, setScreen] = useState('welcome');
            const [currentMode, setCurrentMode] = useState(null);
            const [lastResult, setLastResult] = useState({ score: 0, total: 0 });
            const [questionData, setQuestionData] = useState(DEFAULT_QUESTION_BANK);
            const [studentList, setStudentList] = useState([]);
            const [showCourseModal, setShowCourseModal] = useState(false);
            const [adminPassword, setAdminPassword] = useState(() => localStorage.getItem('admin_pwd') || 'admin');
            const [classStructure, setClassStructure] = useState(DEFAULT_CLASS_STRUCTURE);
            const [notification, setNotification] = useState(null);
            
            // State cho Firebase Setup
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);

            // --- INIT FIREBASE ---
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        let app;
                        if (getApps().length === 0) {
                            app = initializeApp(firebaseConfig);
                        } else {
                            app = getApp();
                        }
                        auth = getAuth(app);
                        db = getFirestore(app);
                        
                        // Try to sign in
                        try {
                             await signInAnonymously(auth);
                        } catch (authError) {
                            if (authError.code === 'auth/configuration-not-found' || authError.code === 'auth/admin-restricted-operation') {
                                notify("Lỗi: Chưa bật Authentication trong Firebase Console! Hãy bật 'Anonymous' provider.", "error");
                                console.error("Please enable Authentication > Sign-in method > Anonymous in Firebase Console.");
                                return; // Stop here if auth fails
                            }
                            throw authError;
                        }

                        setFirebaseInitialized(true);
                        console.log("Firebase Connected!");
                    } catch (e) {
                        console.error("Firebase init failed:", e);
                        notify("Lỗi kết nối Firebase: " + e.message, "error");
                    }
                };
                initFirebase();
            }, []);

            // --- FIREBASE REALTIME LISTENERS ---
            useEffect(() => {
                if (!firebaseInitialized || !db) return;

                // 1. Lắng nghe danh sách học sinh (Realtime)
                const q = query(collection(db, "students"), orderBy("createdAt", "desc"));
                const unsubStudents = onSnapshot(q, (snapshot) => {
                    const students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStudentList(students);
                }, (error) => {
                    console.error("Sync students error:", error);
                    if (error.code === 'permission-denied') {
                        notify("Lỗi quyền truy cập: Hãy kiểm tra Rules hoặc tạo Database trong Console.", "error");
                    } else if (error.message.includes("API has not been used")) {
                         notify("Lỗi: Chưa tạo Database Firestore trong Console.", "error");
                    } else {
                        notify("Lỗi đồng bộ dữ liệu: " + error.code, "error");
                    }
                });

                // 2. Lắng nghe cấu trúc lớp học (Realtime)
                const unsubClasses = onSnapshot(doc(db, "config", "classes"), (doc) => {
                    if (doc.exists()) {
                        setClassStructure(doc.data());
                        localStorage.setItem('class_structure', JSON.stringify(doc.data())); // Backup local
                    }
                });

                return () => {
                    unsubStudents && unsubStudents();
                    unsubClasses && unsubClasses();
                };
            }, [firebaseInitialized]);

            const notify = (msg, type='info') => { setNotification({msg, type}); setTimeout(() => setNotification(null), 3000); };

            // --- FIREBASE ACTIONS ---
            const handleLogin = async (userData) => { 
                const now = new Date();
                const studentData = { 
                    ...userData, 
                    loginTime: now.toLocaleString('vi-VN'), 
                    dateKey: now.toLocaleDateString('vi-VN'),
                    createdAt: serverTimestamp() // Dùng giờ server để sort chuẩn
                };
                
                try {
                    // Thêm học sinh mới vào Firestore
                    const docRef = await addDoc(collection(db, "students"), studentData);
                    // Lưu ID document để sau này update điểm
                    setUser({ ...studentData, id: docRef.id }); 
                    setScreen('dashboard'); 
                } catch (e) {
                    console.error("Login error", e);
                    notify("Lỗi đăng nhập! Kiểm tra kết nối mạng.", "error");
                }
            };

            const updateStudentScore = async (score) => {
                if (!user || !user.id) return;
                try {
                    const studentRef = doc(db, "students", user.id);
                    await updateDoc(studentRef, { lastScore: score });
                    notify("Đã lưu điểm lên hệ thống!", "success");
                } catch (e) { notify("Lỗi lưu điểm!", "error"); }
            };

            const registerCourse = async (regInfo) => {
                if (!user || !user.id) return;
                try {
                    const studentRef = doc(db, "students", user.id);
                    const updateData = regInfo.courseType === 'python' ? { pythonReg: regInfo } : { scratchReg: regInfo };
                    await updateDoc(studentRef, updateData);
                    setShowCourseModal(false);
                    notify("Đăng ký thành công!", "success");
                } catch (e) { notify("Lỗi đăng ký!", "error"); }
            };

            const handleUpdateClassStructure = async (grade, className) => {
                const updatedStructure = { ...classStructure };
                if (!updatedStructure[grade]) updatedStructure[grade] = [];
                if (!updatedStructure[grade].includes(className)) {
                    updatedStructure[grade].push(className);
                    updatedStructure[grade].sort();
                    
                    // Lưu lên Firestore
                    try {
                        await setDoc(doc(db, "config", "classes"), updatedStructure);
                        notify(`Đã thêm lớp ${className} vào khối ${grade}`, "success");
                    } catch (e) { notify("Lỗi lưu lớp học!", "error"); }
                } else {
                    notify("Lớp này đã tồn tại!", "warning");
                }
            };

            const handleChangeAdminPassword = (newPwd) => { 
                setAdminPassword(newPwd); 
                localStorage.setItem('admin_pwd', newPwd); 
                notify("Đổi mật khẩu thành công!", "success"); 
            };
            
            const handleDeleteHistory = async () => { 
                if(!confirm("CẢNH BÁO: Bạn có chắc chắn muốn xóa TOÀN BỘ dữ liệu lịch sử và điểm số của học sinh trên hệ thống Online không?\n\nHành động này KHÔNG THỂ khôi phục!")) return;

                try {
                    // Lấy toàn bộ document trong collection 'students'
                    const studentsRef = collection(db, "students");
                    const snapshot = await getDocs(studentsRef);
                    
                    if (snapshot.empty) {
                        notify("Dữ liệu trống, không có gì để xóa.", "info");
                        return;
                    }

                    // Tạo mảng các promise xóa
                    const deletePromises = snapshot.docs.map(doc => deleteDoc(doc.ref));
                    
                    // Chờ tất cả xóa xong
                    await Promise.all(deletePromises);
                    
                    notify(`Đã xóa vĩnh viễn ${snapshot.size} bản ghi lịch sử!`, "success");
                    setStudentList([]); // Clear local state immediately for visual feedback
                } catch (e) {
                    console.error("Delete error:", e);
                    notify("Lỗi khi xóa dữ liệu: " + e.message, "error");
                }
            };

            return (
                <div className="font-sans antialiased text-slate-800">
                    <NotificationToast notification={notification} onClose={() => setNotification(null)} />
                    {screen === 'welcome' && <WelcomeScreen onLogin={handleLogin} onAdminLogin={()=>setScreen('admin')} adminPassword={adminPassword} classStructure={classStructure} notify={notify} />}
                    {screen === 'admin' && <AdminScreen onBack={()=>setScreen('welcome')} studentList={studentList} onDeleteHistory={handleDeleteHistory} onUploadData={setQuestionData} onChangePassword={handleChangeAdminPassword} onUpdateClassStructure={handleUpdateClassStructure} classStructure={classStructure} notify={notify}/>}
                    {screen === 'dashboard' && user && <Dashboard user={user} onSelectMode={(m)=>{setCurrentMode(m); setScreen('game')}} onLogout={()=>{setUser(null); setScreen('welcome')}} onOpenCourse={setShowCourseModal}/>}
                    {screen === 'game' && user && <GameScreen user={user} mode={currentMode} onFinish={(r)=>{setLastResult(r); updateStudentScore(r.score); setScreen('result')}} onBack={()=>setScreen('dashboard')} questionData={questionData}/>}
                    {screen === 'result' && <ResultScreen score={lastResult.score} total={lastResult.total} onRetry={()=>setScreen('game')} onHome={()=>setScreen('dashboard')} />}
                    {showCourseModal && <CourseRegistrationModal courseType={showCourseModal} onClose={()=>setShowCourseModal(false)} onRegister={registerCourse} defaultGrade={user?.grade} notify={notify} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
